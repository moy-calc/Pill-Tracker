<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedTracker Sync Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap');
        
        :root { --bg: #f8fafc; --card: rgba(255, 255, 255, 0.9); --text: #1e293b; --accent: #6366f1; --border: rgba(148, 163, 184, 0.2); --accent-glow: rgba(99, 102, 241, 0.3); }
        .dark { --bg: #0f172a; --card: rgba(30, 41, 59, 0.8); --text: #f1f5f9; --accent: #818cf8; --border: rgba(255, 255, 255, 0.1); --accent-glow: rgba(129, 140, 248, 0.2); }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: background 0.4s ease;
            min-height: 100vh;
        }

        .glass { 
            background: var(--card); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border); 
            border-radius: 24px; box-shadow: 0 10px 50px -12px rgba(0,0,0,0.05);
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; opacity: 0; transform: translateY(10px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        .dose-btn { 
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); 
            background: rgba(148, 163, 184, 0.08); 
            border-radius: 12px; 
            position: relative;
            overflow: hidden;
        }
        .dose-btn.active { 
            background: var(--accent); 
            color: white; 
            box-shadow: 0 8px 25px -4px var(--accent-glow); 
            transform: scale(1.05); 
            border-color: transparent;
        }
        .dose-btn:active { transform: scale(0.92); }

        .progress-bar { height: 8px; border-radius: 99px; background: rgba(148, 163, 184, 0.1); overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 15px var(--accent); }

        .cal-cell { aspect-ratio: 1/1.15; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; cursor: pointer; border: 1px solid transparent; }
        .cal-cell:hover { background: rgba(148, 163, 184, 0.05); }
        .ratio-tag { background: var(--accent); color: white; font-size: 0.5rem; padding: 2px 6px; border-radius: 4px; margin-top: 4px; font-weight: 800; }

        /* Med Tabs */
        .med-tab { 
            padding: 8px 14px; 
            border-radius: 14px; 
            font-size: 0.85rem; 
            font-weight: 700; 
            transition: all 0.2s; 
            cursor: pointer; 
            border: 1px solid var(--border);
            white-space: nowrap;
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
        }
        .med-tab:hover { opacity: 1; }
        .med-tab.active { 
            background: var(--bg); 
            color: var(--text); 
            opacity: 1; 
            border-color: var(--accent); 
            box-shadow: 0 4px 12px -2px rgba(0,0,0,0.1);
            transform: translateY(-1px);
        }
        .med-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .delete-med { 
            width: 18px; height: 18px; 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 10px; 
            background: rgba(0,0,0,0.05); 
            color: #ef4444; 
            opacity: 0; 
            transition: 0.2s;
            flex-shrink: 0;
        }
        .med-tab:hover .delete-med { opacity: 1; }
        .med-tab.active .delete-med { opacity: 1; background: rgba(239, 68, 68, 0.1); }

        /* Modals & Toasts */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 50; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.open { display: flex; opacity: 1; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--text); color: var(--bg); padding: 12px 24px; border-radius: 50px; font-weight: 600; z-index: 100; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 8px;}
        .toast.show { transform: translateX(-50%) translateY(0); }

        .spinner { width: 20px; height: 20px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin 0.75s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-3 md:p-6 antialiased selection:bg-indigo-500 selection:text-white">

    <!-- Toast -->
    <div id="toast" class="toast">
        <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        <span id="toastMsg">Sauvegardé</span>
    </div>

    <!-- Modal Add Med -->
    <div id="addMedModal" class="modal-overlay" onclick="closeModal('addMedModal')">
        <div class="glass p-6 w-full max-w-xs text-center transform scale-95 transition-transform duration-300" onclick="event.stopPropagation()">
            <h3 class="font-bold text-lg mb-4">Nouveau Médicament</h3>
            <input type="text" id="newMedName" placeholder="Nom (ex: Doliprane)" class="w-full bg-slate-500/10 border border-slate-500/20 rounded-xl p-3 text-center font-bold outline-none focus:border-indigo-500 mb-3">
            <input type="number" id="newMedSize" placeholder="Taille (ex: 10)" class="w-full bg-slate-500/10 border border-slate-500/20 rounded-xl p-3 text-center font-bold outline-none focus:border-indigo-500 mb-3">
            
            <p class="text-xs font-bold uppercase opacity-50 mb-2 text-left">Couleur</p>
            <div class="flex justify-between gap-2 mb-6" id="colorPicker"></div>

            <button onclick="confirmAddMed()" class="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg active:scale-95 transition-transform">Ajouter</button>
        </div>
    </div>

    <!-- Modal Edit History -->
    <div id="editModal" class="modal-overlay" onclick="closeModal('editModal')">
        <div class="glass p-6 w-80 text-center transform scale-95 transition-transform duration-300" onclick="event.stopPropagation()">
            <h3 class="font-bold text-lg mb-1">Modifier</h3>
            <p id="modalDateDisplay" class="text-xs opacity-50 mb-4">Date</p>
            <input type="text" id="modalInput" class="w-full bg-slate-500/10 border border-slate-500/20 rounded-xl p-3 text-center font-bold text-xl outline-none focus:border-indigo-500 transition-colors mb-4">
            <div class="flex gap-2">
                <button onclick="saveHistoryModal()" class="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-xl active:scale-95 transition-transform">OK</button>
                <button onclick="deleteHistoryEntry()" class="px-4 py-3 bg-red-500/10 text-red-500 font-bold rounded-xl active:scale-95 transition-transform">✕</button>
            </div>
        </div>
    </div>

    <!-- Modal Confirm Finish -->
    <div id="finishModal" class="modal-overlay" onclick="closeModal('finishModal')">
        <div class="glass p-6 w-80 text-center transform scale-95 transition-transform duration-300" onclick="event.stopPropagation()">
            <div class="w-16 h-16 bg-green-100 dark:bg-green-900/30 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">✓</div>
            <h3 class="font-bold text-lg mb-2">Boîte Terminée !</h3>
            <p class="text-sm opacity-60 mb-6">Voulez-vous commencer une nouvelle boîte ? L'historique de la précédente sera conservé.</p>
            <div class="flex gap-2">
                <button onclick="confirmFinishPack()" class="flex-1 py-3 bg-green-600 text-white font-bold rounded-xl shadow-lg active:scale-95 transition-transform">Oui, Recharger</button>
                <button onclick="closeModal('finishModal')" class="px-4 py-3 bg-slate-500/10 text-slate-500 font-bold rounded-xl active:scale-95 transition-transform">Non</button>
            </div>
        </div>
    </div>

    <nav class="max-w-3xl mx-auto flex justify-between items-center p-4 glass mb-4 fade-in">
        <h1 class="text-xl font-extrabold tracking-tight flex items-center gap-2">
            <span class="text-indigo-500">●</span> MedTracker
        </h1>
        <div class="flex items-center gap-2">
            <!-- Bouton Changer de compte (visible seulement si connecté) -->
            <button id="navLogoutBtn" onclick="doLogout()" class="hidden px-3 py-1 text-xs font-bold bg-slate-500/10 text-slate-500 rounded-lg hover:bg-slate-500/20 transition-colors">
                Changer de compte
            </button>
            
            <button onclick="toggleTheme()" class="w-9 h-9 rounded-xl flex items-center justify-center bg-slate-500/5 hover:bg-slate-500/10 transition-colors">🌓</button>
            <button onclick="setLang()" class="w-9 h-9 rounded-xl flex items-center justify-center bg-slate-500/5 hover:bg-slate-500/10 transition-colors font-bold text-xs">🌐</button>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto space-y-4">
        
        <!-- LOGIN -->
        <div id="loginBox" class="glass p-8 text-center space-y-5 fade-in">
            <div class="space-y-2">
                <input type="text" id="userInput" oninput="checkUserAvailability()" placeholder="Identifiant" class="w-full bg-slate-500/10 border border-slate-500/20 rounded-xl p-4 text-center text-lg outline-none focus:border-indigo-500 transition-all font-bold">
                <div id="userStatus" class="text-xs font-bold uppercase tracking-wide text-emerald-500 h-4 opacity-0 transition-opacity">Nouveau compte</div>
            </div>
            
            <div id="passContainer" class="space-y-2 hidden transform transition-all duration-300 origin-top relative">
                <input type="password" id="passInput" placeholder="Mot de passe" class="w-full bg-slate-500/10 border border-slate-500/20 rounded-xl p-4 pr-12 text-center text-lg outline-none focus:border-indigo-500 transition-all font-bold">
                <button onclick="togglePasswordVisibility()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-500 transition-colors">
                    <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                    <svg id="eyeOffIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.05 10.05 0 011.574-2.59M5.22 5.22a10.057 10.057 0 013.226-1.832C9.586 2.832 10.774 2.75 12 2.75c4.478 0 8.268 2.943 9.542 7a10.05 10.05 0 01-1.575 2.59m-4.97 4.97a3 3 0 11-4.243-4.243m0 0L3 3m18 18l-3.75-3.75" /></svg>
                </button>
            </div>

            <button onclick="handleAuth()" id="btnLogin" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-xl shadow-indigo-500/20 active:scale-95 transition-all uppercase tracking-widest text-sm">
                Connexion / Inscription
            </button>
            <p id="loginError" class="text-red-500 text-xs font-bold opacity-0 transition-opacity"></p>
        </div>

        <!-- APP -->
        <div id="appBody" class="hidden space-y-4">
            
            <!-- Med Selector (Tabs) -->
            <div class="glass p-4 fade-in">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="text-xs font-bold uppercase opacity-50 tracking-widest">Mes Traitements</h2>
                    <button onclick="openModal('addMedModal')" class="w-8 h-8 rounded-lg bg-indigo-500/10 text-indigo-500 font-bold flex items-center justify-center hover:bg-indigo-500 hover:text-white transition-colors">+</button>
                </div>
                <div id="medTabs" class="flex gap-2 overflow-x-auto pb-2 scroll-smooth no-scrollbar">
                    <!-- Tabs inserted here -->
                </div>
            </div>

            <!-- Grid Section -->
            <div class="glass p-6 fade-in">
                <div class="flex justify-between items-end mb-5">
                    <div>
                        <span class="text-[10px] font-bold uppercase opacity-60 tracking-widest">Progression</span>
                        <h2 id="currentMedNameDisplay" class="text-2xl font-black mt-1">...</h2>
                    </div>
                    <div class="text-right">
                         <span id="percentText" class="text-3xl font-black" style="color: var(--accent)">0%</span>
                    </div>
                </div>
                
                <div class="progress-bar mb-6"><div id="progressFill" class="progress-fill" style="width: 0%"></div></div>

                <div class="flex justify-between items-center mb-4 px-1">
                    <span class="text-xs font-bold opacity-50">PLAQUE ACTUELLE</span>
                    <input type="number" id="gridSizeInput" onchange="updatePackSize()" class="bg-slate-500/10 border-none rounded-lg p-1 w-14 text-center font-bold outline-none focus:ring-1 ring-indigo-500/50">
                </div>
                
                <div id="grid" class="grid grid-cols-5 sm:grid-cols-5 md:grid-cols-10 gap-2"></div>
            </div>

            <!-- Calendar -->
            <div class="glass p-6 fade-in">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="changeMonth(-1)" class="p-2 rounded-lg hover:bg-slate-500/10 transition-colors">←</button>
                    <h3 id="calMonth" class="font-extrabold uppercase text-sm tracking-wide"></h3>
                    <button onclick="changeMonth(1)" class="p-2 rounded-lg hover:bg-slate-500/10 transition-colors">→</button>
                </div>
                <div id="calendar" class="grid grid-cols-7 gap-2 text-center text-sm"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc, onSnapshot, collection, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyAx7c0bFNXuBxadAUItyP6h0U",
            authDomain: "pilltracker-59495.firebaseapp.com",
            projectId: "pilltracker-59495",
            storageBucket: "pilltracker-59495.appspot.com",
            messagingSenderId: "72228771158",
            appId: "1:72228771158:web:a03f36b13f23f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const MED_COLORS = ["#6366f1", "#ef4444", "#10b981", "#f59e0b", "#ec4899", "#06b6d4"];
        let selectedColor = MED_COLORS[0];

        let user = "";
        let currentMedId = null;
        let medsList = [];
        let currentDate = new Date();
        let unsubscribeGrid = null;
        let unsubscribeHistory = null;

        // --- Password Toggle ---
        window.togglePasswordVisibility = () => {
            const input = document.getElementById('passInput');
            const eyeIcon = document.getElementById('eyeIcon');
            const eyeOffIcon = document.getElementById('eyeOffIcon');
            if (input.type === "password") {
                input.type = "text";
                eyeIcon.classList.add('hidden');
                eyeOffIcon.classList.remove('hidden');
            } else {
                input.type = "password";
                eyeIcon.classList.remove('hidden');
                eyeOffIcon.classList.add('hidden');
            }
        };

        // --- Auth ---
        window.checkUserAvailability = async () => {
            const name = document.getElementById('userInput').value.trim().toLowerCase();
            const status = document.getElementById('userStatus');
            const passContainer = document.getElementById('passContainer');
            const loginError = document.getElementById('loginError');
            
            loginError.style.opacity = 0;

            if (name.length < 3) { 
                status.classList.remove('opacity-100'); 
                passContainer.classList.add('hidden'); 
                return; 
            }

            status.classList.remove('opacity-0');
            const userDoc = await getDoc(doc(db, "users", name));
            const exists = userDoc.exists();
            
            status.innerText = exists ? "Compte existant" : "Nouveau compte";
            status.style.color = exists ? "var(--accent)" : "#10b981";
            
            if(passContainer.classList.contains('hidden')) {
                passContainer.classList.remove('hidden');
                document.getElementById('passInput').focus();
            }
        };

        window.handleAuth = async () => {
            const name = document.getElementById('userInput').value.trim().toLowerCase();
            const pass = document.getElementById('passInput').value;
            const btn = document.getElementById('btnLogin');
            const errorMsg = document.getElementById('loginError');

            if (name.length < 3) {
                errorMsg.innerText = "Identifiant trop court";
                errorMsg.style.opacity = 1;
                return;
            }
            if (!pass) {
                errorMsg.innerText = "Mot de passe requis";
                errorMsg.style.opacity = 1;
                document.getElementById('passContainer').classList.remove('hidden');
                document.getElementById('passInput').focus();
                return;
            }

            btn.innerHTML = '<div class="spinner mx-auto border-white w-5 h-5"></div>';

            const userRef = doc(db, "users", name);
            const docSnap = await getDoc(userRef);
            let success = false;

            if (docSnap.exists()) {
                if (docSnap.data().password === pass) success = true;
                else {
                    errorMsg.innerText = "Mot de passe incorrect";
                    errorMsg.style.opacity = 1;
                }
            } else {
                await setDoc(userRef, { password: pass, created: new Date().toISOString() });
                success = true;
                const newMedRef = doc(collection(db, "users", name, "medications"));
                await setDoc(newMedRef, {
                    name: "Mon Traitement",
                    color: MED_COLORS[0],
                    size: 10
                });
            }

            if (success) {
                proceed(name);
                localStorage.setItem('medUser', name);
            } else {
                btn.innerText = "Connexion / Inscription";
            }
        };

        // --- Logout / Switch Account ---
        window.doLogout = async () => {
            if(confirm("Voulez-vous vous déconnecter et changer de compte ?")) {
                // Stop Listeners
                if (unsubscribeGrid) unsubscribeGrid();
                if (unsubscribeHistory) unsubscribeHistory();
                
                // Clear Data
                user = "";
                currentMedId = null;
                medsList = [];
                localStorage.removeItem('medUser');
                
                // Reset UI
                document.getElementById('appBody').classList.add('hidden');
                document.getElementById('navLogoutBtn').classList.add('hidden');
                document.getElementById('loginBox').classList.remove('hidden');
                document.getElementById('userInput').value = '';
                document.getElementById('passInput').value = '';
                document.getElementById('passContainer').classList.add('hidden');
                document.getElementById('btnLogin').innerText = "Connexion / Inscription";
                
                // Reset Styles
                document.documentElement.style.setProperty('--accent', '#6366f1');
            }
        }

        function proceed(name) {
            user = name;
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('appBody').classList.remove('hidden');
            document.getElementById('navLogoutBtn').classList.remove('hidden'); // Show logout button
            loadMeds();
        }

        // --- Meds Management ---
        async function loadMeds() {
            const snap = await getDocs(collection(db, "users", user, "medications"));
            medsList = [];
            snap.forEach(d => medsList.push({ id: d.id, ...d.data() }));
            
            renderMedTabs();
            
            if (medsList.length > 0) {
                // Try to restore selection or default to 0
                if (currentMedId && medsList.find(m => m.id === currentMedId)) {
                    switchMed(currentMedId);
                } else {
                    switchMed(medsList[0].id);
                }
            } else {
                // No meds
                currentMedId = null;
                const grid = document.getElementById('grid');
                grid.innerHTML = '<div class="col-span-full text-center opacity-40 py-10 text-sm">Aucun traitement.<br>Cliquez sur + pour en ajouter un.</div>';
                document.getElementById('progressFill').style.width = '0%';
                document.getElementById('percentText').innerText = '0%';
                document.getElementById('currentMedNameDisplay').innerText = "";
                document.documentElement.style.setProperty('--accent', '#6366f1');
            }
        }

        function renderMedTabs() {
            const container = document.getElementById('medTabs');
            container.innerHTML = '';
            medsList.forEach(med => {
                const btn = document.createElement('button');
                btn.className = `med-tab ${med.id === currentMedId ? 'active' : ''}`;
                btn.style.borderColor = med.id === currentMedId ? med.color : 'var(--border)';
                
                // Inner HTML with Name and Delete Button
                btn.innerHTML = `
                    <span class="med-dot" style="background:${med.color}"></span>
                    <span class="truncate max-w-[100px]">${med.name}</span>
                    <span class="delete-med" onclick="window.deleteMed('${med.id}')">✕</span>
                `;
                
                btn.onclick = () => switchMed(med.id);
                container.appendChild(btn);
            });
        }

        // --- FIXED DELETION LOGIC ---
        window.deleteMed = async (id) => {
            // Prevent clicking the tab when clicking delete
            event.stopPropagation();
            
            if(confirm("Voulez-vous vraiment supprimer ce traitement et tout son historique ?")) {
                try {
                    await deleteDoc(doc(db, "users", user, "medications", id));
                    
                    // Reload list immediately
                    await loadMeds();
                    
                    // If we deleted the active one, the logic in loadMeds() handles switching to index 0 or showing empty state.
                    
                    showToast("Traitement supprimé");
                } catch (e) {
                    console.error(e);
                    alert("Erreur lors de la suppression.");
                }
            }
        }

        function switchMed(id) {
            if (unsubscribeGrid) unsubscribeGrid();
            if (unsubscribeHistory) unsubscribeHistory();
            
            currentMedId = id;
            const med = medsList.find(m => m.id === id);
            
            if(!med) return; // Safety check

            // Update UI
            document.getElementById('currentMedNameDisplay').innerText = med.name;
            document.getElementById('currentMedNameDisplay').style.color = med.color;
            document.getElementById('gridSizeInput').value = med.size;
            document.documentElement.style.setProperty('--accent', med.color);
            document.documentElement.style.setProperty('--accent-glow', med.color + '4D');
            
            renderMedTabs();
            syncGrid();
            syncHistory();
        }

        window.confirmAddMed = async () => {
            const name = document.getElementById('newMedName').value;
            const size = parseInt(document.getElementById('newMedSize').value) || 10;
            
            if (!name) return alert("Nom requis");

            const newMedRef = doc(collection(db, "users", user, "medications"));
            await setDoc(newMedRef, {
                name: name,
                color: selectedColor,
                size: size
            });
            
            closeModal('addMedModal');
            loadMeds();
            switchMed(newMedRef.id);
            showToast("Médicament ajouté");
        };

        window.updatePackSize = async () => {
            const newSize = parseInt(document.getElementById('gridSizeInput').value);
            if (newSize > 0 && currentMedId) {
                await updateDoc(doc(db, "users", user, "medications", currentMedId), { size: newSize });
                loadMeds();
                syncGrid();
            }
        };

        // --- Grid Logic ---
        function syncGrid() {
            if(!currentMedId) return;
            const colRef = collection(db, "users", user, "medications", currentMedId, "current_doses");
            unsubscribeGrid = onSnapshot(colRef, (snap) => {
                const grid = document.getElementById('grid');
                const sizeInput = document.getElementById('gridSizeInput');
                const currentMed = medsList.find(m => m.id === currentMedId);
                const size = currentMed ? currentMed.size : 10;
                
                sizeInput.value = size; 
                grid.innerHTML = '';
                
                let activeSet = new Set();
                snap.forEach(d => activeSet.add(parseInt(d.id)));

                // Check if full
                if (activeSet.size === size && size > 0) {
                    if (!document.getElementById('finishModal').classList.contains('open')) {
                        openModal('finishModal');
                    }
                }

                const progress = Math.round((activeSet.size / size) * 100);
                document.getElementById('progressFill').style.width = `${Math.min(progress, 100)}%`;
                document.getElementById('percentText').innerText = `${progress}%`;

                for(let i=1; i<=size; i++) {
                    const btn = document.createElement('button');
                    const isActive = activeSet.has(i);
                    btn.className = `dose-btn aspect-square font-bold text-sm shadow-sm ${isActive ? 'active' : ''}`;
                    btn.innerText = i;
                    btn.onclick = () => toggleDose(i, isActive, size);
                    grid.appendChild(btn);
                }
            });
        }

        async function toggleDose(n, isActive, size) {
            const colRef = collection(db, "users", user, "medications", currentMedId, "current_doses");
            const today = new Date().toISOString().split('T')[0];
            const histRef = doc(db, "users", user, "medications", currentMedId, "history", today);

            if (isActive) {
                await deleteDoc(doc(colRef, n.toString()));
                const snap = await getDocs(colRef);
                if (snap.empty) {
                    // Don't delete history to keep old pack data if needed, 
                    // OR delete if it implies undoing the whole pack start.
                    // Let's keep history intact unless user edits it manually.
                } else {
                    let max = 0; 
                    snap.forEach(d => { if(parseInt(d.id) > max) max = parseInt(d.id); });
                    await setDoc(histRef, { ratio: `${max}/${size}` }, { merge: true });
                }
            } else {
                await setDoc(doc(colRef, n.toString()), { taken: true });
                const snap = await getDocs(colRef);
                let max = n; 
                snap.forEach(d => { if(parseInt(d.id) > max) max = parseInt(d.id); });
                await setDoc(histRef, { ratio: `${max}/${size}` }, { merge: true });
            }
        }

        window.confirmFinishPack = async () => {
            // Only clear the current grid
            const colRef = collection(db, "users", user, "medications", currentMedId, "current_doses");
            const snap = await getDocs(colRef);
            
            snap.forEach(async (d) => {
                await deleteDoc(doc(colRef, d.id));
            });

            closeModal('finishModal');
            showToast("Nouvelle boîte commencée");
        }

        // --- History & Calendar ---
        function syncHistory() {
            if(!currentMedId) return;
            const colRef = collection(db, "users", user, "medications", currentMedId, "history");
            unsubscribeHistory = onSnapshot(colRef, (snap) => {
                const historyData = {};
                snap.forEach(d => historyData[d.id] = d.data());
                renderCalendar(historyData);
            });
        }

        window.changeMonth = (dir) => { 
            currentDate.setMonth(currentDate.getMonth() + dir); 
            syncHistory();
        };

        function renderCalendar(historyData) {
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';
            const y = currentDate.getFullYear(), m = currentDate.getMonth();
            document.getElementById('calMonth').innerText = new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' }).format(currentDate);

            const first = new Date(y, m, 1).getDay();
            const days = new Date(y, m + 1, 0).getDate();
            const offset = (first === 0 ? 6 : first - 1);

            for(let i=0; i < offset; i++) cal.innerHTML += '<div></div>';

            for(let d=1; d<=days; d++) {
                const key = `${y}-${String(m+1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const data = historyData[key];
                const cell = document.createElement('div');
                
                const todayStr = new Date().toISOString().split('T')[0];
                const isToday = key === todayStr;

                cell.className = `cal-cell text-xs ${isToday ? 'bg-indigo-500/10' : ''}`;
                cell.innerHTML = `
                    <span class="font-bold opacity-40 ${isToday ? 'text-indigo-500' : ''}">${d}</span>
                    ${data ? `<div class="ratio-tag">${data.ratio}</div>` : ''}
                `;
                
                cell.onclick = () => openEditModal(key, data ? data.ratio : "");
                cal.appendChild(cell);
            }
        }

        let selectedDateKey = null;
        window.openEditModal = (dateKey, currentVal) => {
            selectedDateKey = dateKey;
            document.getElementById('modalDateDisplay').innerText = dateKey;
            document.getElementById('modalInput').value = currentVal;
            openModal('editModal');
        };

        window.saveHistoryModal = async () => {
            if (!currentMedId || !selectedDateKey) return;
            const val = document.getElementById('modalInput').value.trim();
            const docRef = doc(db, "users", user, "medications", currentMedId, "history", selectedDateKey);
            
            if (val === "") await deleteDoc(docRef);
            else await setDoc(docRef, { ratio: val });
            
            closeModal('editModal');
            showToast("Historique mis à jour");
        };

        window.deleteHistoryEntry = async () => {
             document.getElementById('modalInput').value = "";
             window.saveHistoryModal();
        };

        // --- Utils ---
        window.toggleTheme = () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        };

        window.setLang = () => {
            const current = localStorage.getItem('lang') || 'fr';
            const next = current === 'fr' ? 'en' : 'fr';
            localStorage.setItem('lang', next);
            location.reload(); 
        };

        window.openModal = (id) => {
            const m = document.getElementById(id);
            m.classList.remove('hidden');
            requestAnimationFrame(() => m.classList.add('open'));
            if(id === 'addMedModal') {
                document.getElementById('newMedName').value = '';
                document.getElementById('newMedSize').value = '10';
                renderColorPicker();
            }
        };

        window.closeModal = (id) => {
            const m = document.getElementById(id);
            m.classList.remove('open');
            setTimeout(() => m.classList.add('hidden'), 300);
        };

        function renderColorPicker() {
            const p = document.getElementById('colorPicker');
            p.innerHTML = '';
            MED_COLORS.forEach(c => {
                const b = document.createElement('div');
                b.className = `w-8 h-8 rounded-full cursor-pointer border-2 ${selectedColor === c ? 'scale-110 border-slate-400' : 'border-transparent'}`;
                b.style.background = c;
                b.onclick = () => { selectedColor = c; renderColorPicker(); };
                p.appendChild(b);
            });
        }

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        };

        renderColorPicker();

        const savedUser = localStorage.getItem('medUser');
        if(savedUser) {
            document.getElementById('userInput').value = savedUser;
            proceed(savedUser);
        }
    </script>
</body>
</html>
