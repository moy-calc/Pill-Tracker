<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PillTracker Sync Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap');
        :root { --bg: #f8fafc; --card: rgba(255, 255, 255, 0.8); --text: #1e293b; --accent: #6366f1; }
        .dark { --bg: #0b0f1a; --card: rgba(22, 30, 46, 0.7); --text: #f1f5f9; --accent: #818cf8; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.6s ease; min-height: 100vh; }
        .glass { background: var(--card); backdrop-filter: blur(16px); border: 1px solid rgba(148, 163, 184, 0.1); border-radius: 24px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
        .text-anim { animation: reveal 0.5s ease both; }
        @keyframes reveal { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .pill-btn { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: rgba(148, 163, 184, 0.1); border-radius: 14px; }
        .pill-btn.active { background: var(--accent); color: white; transform: scale(1.05); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }
        .progress-bar { height: 8px; border-radius: 4px; background: rgba(148, 163, 184, 0.1); overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); transition: width 0.6s ease; }
        .theme-toggle { width: 42px; height: 42px; border-radius: 12px; cursor: pointer; background: var(--card); border: 1px solid rgba(148, 163, 184, 0.2); display: flex; align-items: center; justify-content: center; }
        .lang-btn { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.75rem; opacity: 0.5; }
        .lang-btn.active { opacity: 1; color: var(--accent); }
        .cal-cell { aspect-ratio: 1/1.2; border-radius: 12px; background: rgba(148, 163, 184, 0.05); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .cal-cell:hover { background: rgba(148, 163, 184, 0.15); }
        .ratio-tag { background: var(--accent); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 6px; margin-top: 4px; font-weight: 800; }
    </style>
</head>
<body class="p-4 md:p-8">
    <nav class="max-w-4xl mx-auto flex justify-between items-center p-4 glass mb-8">
        <h1 id="title" class="text-xl font-extrabold tracking-tight">PillTracker</h1>
        <div class="flex items-center gap-4">
            <div class="flex gap-2 bg-slate-500/5 p-1 rounded-xl">
                <button onclick="setLang('ar')" id="btn-ar" class="lang-btn px-2 py-1">AR</button>
                <button onclick="setLang('fr')" id="btn-fr" class="lang-btn px-2 py-1">FR</button>
                <button onclick="setLang('en')" id="btn-en" class="lang-btn px-2 py-1">EN</button>
            </div>
            <button onclick="toggleTheme()" class="theme-toggle">🌓</button>
        </div>
    </nav>

    <main class="max-w-md mx-auto space-y-6">
        <div id="loginBox" class="glass p-8 text-center space-y-5 text-anim">
            <input type="text" id="userInput" oninput="checkUserAvailability()" placeholder="Identifiant" class="w-full bg-transparent border-b-2 border-slate-300 focus:border-indigo-500 outline-none p-2 text-center text-xl transition-all">
            <div id="userStatus" class="auth-status text-slate-400 font-bold text-xs uppercase mt-2">...</div>
            <input type="password" id="passInput" placeholder="Mot de passe" class="hidden w-full bg-transparent border-b-2 border-slate-300 focus:border-indigo-500 outline-none p-2 text-center text-lg transition-all">
            <button onclick="handleAuth()" id="btnLogin" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg uppercase tracking-widest mt-4">Vérifier</button>
        </div>

        <div id="appBody" class="hidden space-y-6">
            <div class="glass p-6 text-anim">
                <div class="flex justify-between items-center mb-3">
                    <span id="labelProgress" class="text-xs font-bold uppercase opacity-60">Progression</span>
                    <span id="percentText" class="text-xs font-black text-indigo-500">0%</span>
                </div>
                <div class="progress-bar"><div id="progressFill" class="progress-fill" style="width: 0%"></div></div>
            </div>

            <div class="glass p-6 text-anim">
                <div class="flex justify-between items-center mb-6">
                    <span id="labelCount" class="text-xs font-bold uppercase opacity-60">Plaque :</span>
                    <input type="number" id="gridSize" value="10" onchange="updateGridSize()" class="bg-slate-500/10 rounded-lg p-1 w-16 text-center font-bold text-indigo-500 outline-none">
                </div>
                <div id="grid" class="grid grid-cols-5 gap-3"></div>
            </div>

            <div class="glass p-6 text-anim">
                <div class="flex justify-between items-center mb-4">
                    <button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-200 rounded-full">←</button>
                    <h3 id="calMonth" class="font-extrabold uppercase text-sm"></h3>
                    <button onclick="changeMonth(1)" class="p-2 hover:bg-slate-200 rounded-full">→</button>
                </div>
                <div id="calendar" class="grid grid-cols-7 gap-2"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc, onSnapshot, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAx7c0bFNXuBxadAUItyP6h0U",
            authDomain: "pilltracker-59495.firebaseapp.com",
            projectId: "pilltracker-59495",
            storageBucket: "pilltracker-59495.appspot.com",
            messagingSenderId: "72228771158",
            appId: "1:72228771158:web:a03f36b13f23f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const i18n = {
            fr: { title: "PillTracker Sync", label: "Plaque :", login: "Connecter", available: "Disponible", taken: "Compte trouvé", progress: "Progression" },
            en: { title: "PillTracker Sync", label: "Pack Size:", login: "Connect", available: "Available", taken: "Account found", progress: "Progress" },
            ar: { title: "متابع الأدوية", label: "حجم العلبة:", login: "دخول", available: "متاح", taken: "الحساب موجود", progress: "التقدم" }
        };

        let user = "";
        let currentDate = new Date();
        let historyData = {};
        let userExists = false;

        // AUTHENTICATION
        window.checkUserAvailability = async () => {
            const name = document.getElementById('userInput').value.trim().toLowerCase();
            if (name.length < 3) return;
            const userDoc = await getDoc(doc(db, "users", name));
            userExists = userDoc.exists();
            const status = document.getElementById('userStatus');
            const l = localStorage.getItem('lang') || 'fr';
            status.innerText = userExists ? i18n[l].taken : i18n[l].available;
            status.style.color = userExists ? "#818cf8" : "#4ade80";
            document.getElementById('passInput').classList.remove('hidden');
        };

        window.handleAuth = async () => {
            const name = document.getElementById('userInput').value.trim().toLowerCase();
            const pass = document.getElementById('passInput').value;
            if (!name || !pass) return;
            const userRef = doc(db, "users", name);
            if (userExists) {
                const snap = await getDoc(userRef);
                if (snap.data().password === pass) proceed(name); else alert("Mot de passe incorrect");
            } else {
                await setDoc(userRef, { password: pass }); proceed(name);
            }
        };

        function proceed(name) {
            user = name;
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('appBody').classList.remove('hidden');
            syncPills();
            syncHistory();
        }

        // SETTINGS & UI
        window.toggleTheme = () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        };

        window.setLang = (l) => {
            document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('title').innerText = i18n[l].title;
            document.getElementById('labelCount').innerText = i18n[l].label;
            document.getElementById('labelProgress').innerText = i18n[l].progress;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${l}`).classList.add('active');
            localStorage.setItem('lang', l);
            renderCalendar();
            if(document.getElementById('userInput').value) checkUserAvailability();
        };

        // CORE LOGIC - PILLS
        function syncPills() {
            onSnapshot(collection(db, "users", user, "current_pack"), (snap) => {
                const grid = document.getElementById('grid');
                const size = parseInt(document.getElementById('gridSize').value);
                grid.innerHTML = '';
                let activeCount = 0;
                let activeSet = new Set();
                
                snap.forEach(d => {
                    activeSet.add(parseInt(d.id));
                    activeCount++;
                });

                const progress = (activeCount / size) * 100;
                document.getElementById('progressFill').style.width = `${progress}%`;
                document.getElementById('percentText').innerText = `${Math.round(progress)}%`;

                for(let i=1; i<=size; i++) {
                    const btn = document.createElement('button');
                    btn.className = `pill-btn aspect-square font-bold ${activeSet.has(i) ? 'active' : ''}`;
                    btn.innerText = i;
                    // On passe false si active, true si inactive
                    btn.onclick = () => togglePill(i, activeSet.has(i));
                    grid.appendChild(btn);
                }
            });
        }

        async function togglePill(n, isCurrentlyActive) {
            const today = new Date().toISOString().split('T')[0]; // ex: 2024-05-21
            const size = document.getElementById('gridSize').value;
            const packRef = collection(db, "users", user, "current_pack");
            const histRef = doc(db, "users", user, "history", today);

            // 1. Mettre à jour l'état de la pilule avec la DATE actuelle
            if(isCurrentlyActive) {
                await deleteDoc(doc(packRef, n.toString()));
            } else {
                await setDoc(doc(packRef, n.toString()), { 
                    taken: true, 
                    date: today // IMPORTANT: On stocke la date de prise
                });
            }

            // 2. Recalculer le total pour aujourd'hui
            const allPillsSnap = await getDocs(packRef);
            let pillsTakenToday = 0;
            
            allPillsSnap.forEach(d => {
                const data = d.data();
                // On compte seulement si la date correspond à aujourd'hui
                if(data.date === today) {
                    pillsTakenToday++;
                }
            });

            // 3. Gestion de l'historique
            if(pillsTakenToday === 0) {
                // Si aucune pilule prise AUJOURD'HUI, on supprime l'entrée du calendrier d'aujourd'hui
                await deleteDoc(histRef);
            } else {
                // Sinon, on cherche la valeur cumulée d'avant
                const q = query(collection(db, "users", user, "history"), orderBy("__name__", "desc"));
                const historySnap = await getDocs(q);
                
                let lastTotal = 0;
                for (let d of historySnap.docs) {
                    if (d.id < today) { // Trouver la date la plus récente avant aujourd'hui
                        lastTotal = d.data().total || 0;
                        break;
                    }
                }

                const newTotal = lastTotal + pillsTakenToday;
                await setDoc(histRef, { 
                    ratio: `${newTotal}/${size}`, 
                    total: newTotal,
                    dailyCount: pillsTakenToday 
                });
            }
        }

        // CALENDAR
        function syncHistory() {
            onSnapshot(collection(db, "users", user, "history"), (snap) => {
                historyData = {};
                snap.forEach(d => { historyData[d.id] = d.data(); });
                renderCalendar();
            });
        }

        window.changeMonth = (dir) => { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); };

        function renderCalendar() {
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';
            const y = currentDate.getFullYear(), m = currentDate.getMonth();
            const lang = localStorage.getItem('lang') || 'fr';
            document.getElementById('calMonth').innerText = new Intl.DateTimeFormat(lang, { month: 'long', year: 'numeric' }).format(currentDate);

            const first = new Date(y, m, 1).getDay();
            const days = new Date(y, m + 1, 0).getDate();
            const offset = (first === 0 ? 6 : first - 1);

            for(let i=0; i < offset; i++) cal.innerHTML += '<div></div>';

            for(let d=1; d<=days; d++) {
                const key = `${y}-${String(m+1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const data = historyData[key];
                
                const cell = document.createElement('div');
                cell.className = "cal-cell";
                cell.innerHTML = `
                    <span class="text-[10px] font-bold opacity-30">${d}</span>
                    ${data ? `<div class="ratio-tag text-anim">${data.ratio}</div>` : ''}
                `;
                
                // Modification manuelle si besoin
                cell.onclick = async () => {
                    const currentVal = data ? data.ratio : "";
                    const newVal = prompt("Valeur manuelle (ex: 5/10) :", currentVal);
                    if (newVal === null) return;
                    
                    const docRef = doc(db, "users", user, "history", key);
                    if (newVal.trim() === "") {
                        await deleteDoc(docRef);
                    } else {
                        // On essaie d'extraire le chiffre pour maintenir la cohérence du total
                        const num = parseInt(newVal.split('/')[0]) || 0;
                        await setDoc(docRef, { ratio: newVal.trim(), total: num });
                    }
                };
                cal.appendChild(cell);
            }
        }

        // INIT
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
        setLang(localStorage.getItem('lang') || 'fr');
        window.updateGridSize = () => syncPills();
    </script>
</body>
</html>
