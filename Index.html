<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedTracker Sync</title>
    <meta name="description" content="Suivi intelligent de vos médicaments">
    <link rel="manifest" href="data:application/manifest+json,{
        \"name\":\"MedTracker Sync\",
        \"short_name\":\"MedTracker\",
        \"start_url\":\".\",
        \"display\":\"standalone\",
        \"background_color\":\"#f8fafc\",
        \"theme_color\":\"#6366f1\",
        \"icons\":[{\"src\":\"https://cdn-icons-png.flaticon.com/512/3063/3063174.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"}]
    }">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --card: rgba(255,255,255,0.8); --text: #1e293b; --accent: #6366f1; }
        .dark { --bg: #0b0f1a; --card: rgba(22,30,46,0.7); --text: #f1f5f9; --accent: #818cf8; }

        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.6s; min-height: 100vh; }
        .glass { background: var(--card); backdrop-filter: blur(16px); border: 1px solid rgba(148,163,184,0.1); border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); }
        .text-anim { animation: reveal 0.6s cubic-bezier(0.23,1,0.32,1) both; }
        @keyframes reveal { 0% { opacity:0; transform:translateY(10px); filter:blur(4px); } 100% { opacity:1; transform:none; filter:none; } }

        .pill-btn { @apply transition-all duration-300 bg-slate-500/10 rounded-xl font-bold; }
        .pill-btn.active { @apply bg-indigo-600 text-white shadow-lg shadow-indigo-500/30 scale-105; }

        .progress-fill { @apply h-full bg-gradient-to-r from-indigo-500 to-purple-600 transition-all duration-800; border-radius: inherit; }

        .toast { @apply fixed bottom-4 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full bg-slate-800 text-white shadow-2xl z-50 animate-pulse; }

        .med-color { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="max-w-4xl mx-auto flex justify-between items-center p-4 glass mb-8">
        <h1 class="text-2xl font-extrabold tracking-tight">MedTracker</h1>
        <div class="flex items-center gap-4">
            <div class="flex gap-2 bg-slate-500/5 p-1 rounded-xl">
                <button onclick="setLang('ar')" id="btn-ar" class="lang-btn px-3 py-1 text-sm font-bold opacity-50">AR</button>
                <button onclick="setLang('fr')" id="btn-fr" class="lang-btn px-3 py-1 text-sm font-bold opacity-100">FR</button>
                <button onclick="setLang('en')" id="btn-en" class="lang-btn px-3 py-1 text-sm font-bold opacity-50">EN</button>
            </div>
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl glass flex items-center justify-center">🌓</button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto space-y-8">

        <!-- Écran de connexion / inscription -->
        <section id="authSection" class="glass p-8 text-center space-y-6 text-anim">
            <h2 class="text-3xl font-black">Bienvenue</h2>
            <input type="email" id="emailInput" placeholder="Email" class="w-full bg-transparent border-b-2 border-slate-400 focus:border-indigo-500 outline-none p-3 text-center text-xl">
            <input type="password" id="passInput" placeholder="Mot de passe (min. 6 caractères)" class="w-full bg-transparent border-b-2 border-slate-400 focus:border-indigo-500 outline-none p-3 text-center text-xl" minlength="6">
            <div class="flex gap-4 justify-center">
                <button onclick="signIn()" class="px-8 py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg hover:shadow-indigo-500/50 transition-all">Connexion</button>
                <button onclick="signUp()" class="px-8 py-4 bg-slate-600 text-white font-bold rounded-2xl shadow-lg transition-all">Inscription</button>
            </div>
            <p id="authStatus" class="text-sm text-red-500 min-h-[20px]"></p>
        </section>

        <!-- Application principale -->
        <section id="appSection" class="hidden space-y-8">

            <!-- Streak & Rappels -->
            <div class="glass p-6 text-center text-anim">
                <div class="text-5xl font-black text-indigo-600" id="streakCount">0 🔥</div>
                <p class="text-sm opacity-70 mt-2">Jours consécutifs parfaits</p>
                <button onclick="requestNotificationPermission()" class="mt-4 px-6 py-2 bg-indigo-600 text-white rounded-xl text-sm font-bold">Activer les rappels quotidiens</button>
            </div>

            <!-- Liste des médicaments -->
            <div class="glass p-6 text-anim">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-bold">Vos médicaments</h3>
                    <button onclick="openAddMedModal()" class="px-4 py-2 bg-indigo-600 text-white rounded-xl text-sm font-bold">+</button>
                </div>
                <div id="medsList" class="space-y-6"></div>
            </div>

            <!-- Calendrier -->
            <div class="glass p-6 text-anim">
                <div class="flex justify-between items-center mb-4">
                    <button onclick="changeMonth(-1)" aria-label="Mois précédent">←</button>
                    <h3 id="calMonth" class="font-extrabold uppercase text-sm"></h3>
                    <button onclick="changeMonth(1)" aria-label="Mois suivant">→</button>
                </div>
                <div id="calendar" class="grid grid-cols-7 gap-2"></div>
            </div>
        </section>
    </main>

    <!-- Modal ajout médicament -->
    <div id="addMedModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
        <div class="glass p-8 rounded-3xl max-w-sm w-full space-y-6 text-anim">
            <h3 class="text-xl font-bold text-center">Nouveau médicament</h3>
            <input id="medName" placeholder="Nom (ex: Paracétamol)" class="w-full bg-transparent border-b-2 border-slate-400 focus:border-indigo-500 outline-none p-3">
            <input id="medDose" placeholder="Dose (ex: 500mg)" class="w-full bg-transparent border-b-2 border-slate-400 focus:border-indigo-500 outline-none p-3">
            <input type="number" id="medTotal" placeholder="Nombre total par boîte" value="28" min="1" class="w-full bg-transparent border-b-2 border-slate-400 focus:border-indigo-500 outline-none p-3">
            <input type="color" id="medColor" value="#6366f1" class="h-12 rounded-xl">
            <div class="flex gap-4">
                <button onclick="closeAddMedModal()" class="flex-1 py-3 border border-slate-400 rounded-xl">Annuler</button>
                <button onclick="addMedication()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold">Ajouter</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc, onSnapshot, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNsYApKv5hcR833jOkbQfgQZAtWuBDf8Q",
            authDomain: "pillcheck-f0274.firebaseapp.com",
            projectId: "pillcheck-f0274",
            storageBucket: "pillcheck-f0274.appspot.com",
            messagingSenderId: "993827728910",
            appId: "1:993827728910:web:205e7c2016b378b0edd65f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let medications = [];
        let historyData = {};
        let currentDate = new Date();
        let reminderHour = 20; // 20h par défaut

        // Authentification
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('appSection').classList.remove('hidden');
                loadUserData();
            } else {
                currentUser = null;
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('appSection').classList.add('hidden');
            }
        });

        window.signIn = () => {
            const email = document.getElementById('emailInput').value.trim();
            const pass = document.getElementById('passInput').value;
            if (!email || !pass) return showToast("Remplissez email et mot de passe");
            signInWithEmailAndPassword(auth, email, pass)
                .catch(err => showToast("Erreur connexion : " + err.message));
        };

        window.signUp = () => {
            const email = document.getElementById('emailInput').value.trim();
            const pass = document.getElementById('passInput').value;
            if (pass.length < 6) return showToast("Mot de passe trop court (min 6)");
            createUserWithEmailAndPassword(auth, email, pass)
                .then(() => showToast("Compte créé ! Bienvenue !"))
                .catch(err => showToast("Erreur inscription : " + err.message));
        };

        function loadUserData() {
            const userRef = doc(db, "users", currentUser.uid);

            // Médicaments
            onSnapshot(collection(userRef, "medications"), (snap) => {
                medications = [];
                snap.forEach(d => medications.push({ id: d.id, ...d.data() }));
                medications.sort((a, b) => a.name.localeCompare(b.name));
                renderMedications();
            });

            // Historique
            onSnapshot(collection(userRef, "history"), (snap) => {
                historyData = {};
                snap.forEach(d => historyData[d.id] = d.data());
                renderCalendar();
                updateStreak();
            });
        }

        function renderMedications() {
            const list = document.getElementById('medsList');
            list.innerHTML = '';
            const today = new Date().toISOString().split('T')[0];

            if (medications.length === 0) {
                list.innerHTML = '<p class="text-center opacity-60">Aucun médicament ajouté. Cliquez sur + pour commencer.</p>';
            }

            medications.forEach(med => {
                const div = document.createElement('div');
                div.className = "space-y-4";

                const progressRef = collection(db, "users", currentUser.uid, "packs", med.id);
                onSnapshot(progressRef, async (packSnap) => {
                    let taken = packSnap.size;
                    let progress = (taken / med.total) * 100;
                    let ratio = `\( {taken}/ \){med.total}`;

                    // Mise à jour historique du jour
                    const histRef = doc(db, "users", currentUser.uid, "history", today);
                    const histSnap = await getDoc(histRef);
                    let dayData = histSnap.data() || { ratios: {} };
                    dayData.ratios[med.id] = ratio;
                    await setDoc(histRef, dayData, { merge: true });

                    div.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div>
                                <span class="med-color" style="background:${med.color}"></span>
                                <span class="font-bold">${med.name}</span>
                                <span class="text-sm opacity-70"> (${med.dose})</span>
                            </div>
                            <button onclick="deleteMed('${med.id}')" class="text-red-500 text-sm">Supprimer</button>
                        </div>
                        <div class="text-xs opacity-70 mb-2">${ratio} prises</div>
                        <div class="h-3 bg-slate-500/20 rounded-full overflow-hidden">
                            <div class="progress-fill h-full" style="width:${progress}%"></div>
                        </div>
                        <div class="grid grid-cols-7 gap-2 mt-4" id="grid-${med.id}"></div>
                    `;

                    const grid = div.querySelector(`#grid-${med.id}`);
                    grid.innerHTML = '';
                    for (let i = 1; i <= med.total; i++) {
                        const btn = document.createElement('button');
                        btn.className = `pill-btn aspect-square text-sm ${packSnap.docs.some(d => d.id === i.toString()) ? 'active' : ''}`;
                        btn.textContent = i;
                        btn.onclick = () => toggleDose(med.id, i, btn);
                        grid.appendChild(btn);
                    }
                });

                list.appendChild(div);
            });
        }

        async function toggleDose(medId, num, btn) {
            const packRef = doc(db, "users", currentUser.uid, "packs", medId, num.toString());
            const snap = await getDoc(packRef);
            if (snap.exists()) {
                await deleteDoc(packRef);
                btn.classList.remove('active');
            } else {
                await setDoc(packRef, { taken: true });
                btn.classList.add('active');
            }
            showToast("Prise mise à jour");
        }

        window.deleteMed = async (medId) => {
            if (!confirm("Supprimer définitivement ce médicament et toutes ses prises ?")) return;
            const medRef = doc(db, "users", currentUser.uid, "medications", medId);
            const packCol = collection(db, "users", currentUser.uid, "packs", medId);
            const packs = await getDocs(packCol);
            packs.forEach(d => deleteDoc(d.ref));
            await deleteDoc(medRef);
            showToast("Médicament supprimé");
        };

        window.openAddMedModal = () => document.getElementById('addMedModal').classList.remove('hidden');
        window.closeAddMedModal = () => {
            document.getElementById('addMedModal').classList.add('hidden');
            document.getElementById('medName').value = '';
            document.getElementById('medDose').value = '';
            document.getElementById('medTotal').value = '28';
        };

        window.addMedication = async () => {
            const name = document.getElementById('medName').value.trim();
            const dose = document.getElementById('medDose').value.trim();
            const total = parseInt(document.getElementById('medTotal').value);
            const color = document.getElementById('medColor').value;

            if (!name || total < 1) return showToast("Vérifiez les champs");

            const medRef = doc(collection(db, "users", currentUser.uid, "medications"));
            await setDoc(medRef, { name, dose: dose || "—", total, color });
            closeAddMedModal();
            showToast("Médicament ajouté !");
        };

        function renderCalendar() {
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';
            const lang = localStorage.getItem('lang') || 'fr';
            document.getElementById('calMonth').innerText = new Intl.DateTimeFormat(lang, { month: 'long', year: 'numeric' }).format(currentDate);

            const y = currentDate.getFullYear(), m = currentDate.getMonth();
            const firstDay = new Date(y, m, 1).getDay();
            const daysInMonth = new Date(y, m + 1, 0).getDate();
            const offset = firstDay === 0 ? 6 : firstDay - 1;

            for (let i = 0; i < offset; i++) cal.innerHTML += '<div></div>';

            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = `\( {y}- \){String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const data = historyData[dateKey];
                let totalToday = 0, takenToday = 0;

                if (data && data.ratios) {
                    Object.values(data.ratios).forEach(r => {
                        const [taken, total] = r.split('/').map(Number);
                        takenToday += taken || 0;
                        totalToday += total || 0;
                    });
                }

                const cell = document.createElement('div');
                cell.className = "aspect-square rounded-xl bg-slate-500/10 flex flex-col items-center justify-center text-xs font-bold hover:bg-slate-500/20 transition";
                cell.innerHTML = `
                    <span class="opacity-40">${d}</span>
                    \( {totalToday > 0 ? `<span class=" \){takenToday === totalToday ? 'text-green-500' : 'text-orange-500'}">\( {takenToday}/ \){totalToday}</span>` : ''}
                `;
                cal.appendChild(cell);
            }
        }

        function updateStreak() {
            let streak = 0;
            let tempDate = new Date();
            while (true) {
                const key = tempDate.toISOString().split('T')[0];
                const data = historyData[key];
                let perfect = true;
                if (data && data.ratios) {
                    for (const r of Object.values(data.ratios)) {
                        const [taken, total] = r.split('/').map(Number);
                        if (taken < total) perfect = false;
                    }
                } else if (medications.length > 0) perfect = false;

                if (perfect) streak++;
                else break;

                tempDate.setDate(tempDate.getDate() - 1);
                if (streak > 365) break; // sécurité
            }
            document.getElementById('streakCount').innerText = streak + (streak > 0 ? " 🔥" : "");
        }

        window.changeMonth = (dir) => {
            currentDate.setMonth(currentDate.getMonth() + dir);
            renderCalendar();
        };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        // Notifications
        window.requestNotificationPermission = async () => {
            if (!("Notification" in window)) return showToast("Notifications non supportées");
            if (Notification.permission === "granted") {
                scheduleDailyReminder();
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission().then(perm => {
                    if (perm === "granted") scheduleDailyReminder();
                });
            } else {
                showToast("Notifications bloquées dans le navigateur");
            }
        };

        function scheduleDailyReminder() {
            const now = new Date();
            let reminderTime = new Date();
            reminderTime.setHours(reminderHour, 0, 0, 0);
            if (reminderTime <= now) reminderTime.setDate(reminderTime.getDate() + 1);

            const delay = reminderTime - now;
            setTimeout(() => {
                new Notification("🔔 MedTracker", { body: "Pensez à prendre vos médicaments aujourd'hui !" });
                scheduleDailyReminder();
            }, delay);
            showToast(`Rappels activés à ${reminderHour}h`);
        }

        // Langue
        window.setLang = (l) => {
            document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
            localStorage.setItem('lang', l);
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.replace('opacity-100', 'opacity-50'));
            document.getElementById(`btn-${l}`).classList.replace('opacity-50', 'opacity-100');
            renderCalendar();
        };

        // Thème
        window.toggleTheme = () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        };

        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
        setLang(localStorage.getItem('lang') || 'fr');
    </script>
</body>
</html>
