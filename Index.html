<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedTracker Test</title>
    <link rel="manifest" href="manifest.json">
</head>
<body style="font-family:sans-serif; padding:20px;">

<h1>MedTracker - Test SW & Notifications</h1>

<!-- Boutons test -->
<button onclick="requestNotificationPermission()">🔔 Autoriser Notifications</button>
<button onclick="testNotification()">🧪 Tester Notification</button>
<button onclick="checkSW()">🔍 Vérifier Service Worker</button>
<button onclick="alert('Test clic simple !')">Test clic simple</button>

<script>
    // --- ENREGISTREMENT SERVICE WORKER ---
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
        .then(() => console.log("Service Worker OK"))
        .catch(err => console.error("SW erreur:", err));
    }

    // --- Vérifier Service Worker ---
    function checkSW() {
        navigator.serviceWorker.getRegistrations().then(regs => {
            if (regs.length > 0) {
                alert('Service Worker actif ✅ Scope : ' + regs[0].scope);
            } else {
                alert('Aucun Service Worker trouvé ❌');
            }
        });
    }

    // --- Notifications ---
    async function requestNotificationPermission() {
        if (Notification.permission === "granted") {
            alert("Notifications déjà autorisées ! Tu peux tester avec 🧪");
            return;
        }
        const permission = await Notification.requestPermission();
        if (permission === "granted") {
            alert("Notifications autorisées ! 🎉 Clique sur 🧪 pour tester");
        } else {
            alert("Notifications refusées 😔");
        }
    }

    function testNotification() {
        if (Notification.permission !== "granted") {
            alert("Autorise d'abord les notifications avec 🔔");
            return;
        }

        navigator.serviceWorker.ready.then(reg => {
            reg.showNotification("MedTracker Pro", {
                body: "Test réussi ! 🎉 Les notifications fonctionnent.",
                icon: "icon.png",
                badge: "icon.png",
                tag: "test-notif"
            });
        });
    }
</script>

</body>
</html>
