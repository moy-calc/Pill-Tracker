<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedTracker Sync Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --bg: #f8fafc; --card: rgba(255, 255, 255, 0.95); --text: #1e293b; --border: rgba(148, 163, 184, 0.1); }
        .dark { --bg: #0f172a; --card: rgba(30, 41, 59, 0.9); --text: #f1f5f9; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.4s; min-height: 100vh; }
        .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; }
        .progress-bar { height: 6px; width: 100%; background: rgba(148, 163, 184, 0.1); border-radius: 10px; overflow: hidden; }
        .cal-cell { min-height: 95px; border-radius: 12px; display: flex; flex-direction: column; padding: 4px; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .ratio-badge { font-size: 0.52rem; padding: 1px 3px; border-radius: 4px; color: white; margin-bottom: 2px; font-weight: 800; text-align: center; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.open { display: flex; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .alert-stock { animation: pulse 1.5s infinite; font-size: 8px; font-weight: 900; padding: 2px 6px; border-radius: 6px; }
    </style>
</head>
<body class="p-3 antialiased">
    <div id="drawerOverlay" class="fixed inset-0 bg-black/40 z-[1500] hidden" onclick="closeDrawers()"></div>

    <nav class="max-w-4xl mx-auto flex justify-between items-center p-4 glass mb-6 relative z-[2000]">
        <button onclick="openModal('accountModal')" id="accBtn" class="w-10 h-10 rounded-xl bg-slate-500/5 flex items-center justify-center hidden">👤</button>
        <h1 class="text-xl font-black text-indigo-500 italic">MEDTRACKER PRO</h1>
        <div class="flex gap-2">
            <button onclick="testNotification()" class="w-10 h-10 rounded-xl bg-green-500/5 flex items-center justify-center">🧪</button>
            <button onclick="requestNotificationPermission()" id="notifBtn" class="w-10 h-10 rounded-xl bg-slate-500/5 flex items-center justify-center">🔔</button>
            <button onclick="openRightDrawer()" class="w-10 h-10 rounded-xl bg-slate-500/5 flex items-center justify-center">🕒</button>
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl bg-slate-500/5 flex items-center justify-center">🌓</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto space-y-6">
        <div id="loginBox" class="glass p-8 text-center space-y-4 max-w-sm mx-auto">
            <div class="space-y-3">
                <input type="text" id="lastName" oninput="updateKey()" placeholder="Nom" class="w-full bg-slate-500/10 rounded-xl p-4 font-bold outline-none">
                <input type="text" id="firstName" oninput="updateKey()" placeholder="Prénom" class="w-full bg-slate-500/10 rounded-xl p-4 font-bold outline-none">
                <input type="date" id="birthDate" oninput="updateKey()" class="w-full bg-slate-500/10 rounded-xl p-4 font-bold outline-none">
                <input type="password" id="passInput" placeholder="Mot de passe" class="w-full bg-slate-500/10 rounded-xl p-4 text-center font-bold outline-none hidden">
            </div>
            <button id="authBtn" onclick="handleAuth()" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl opacity-50 pointer-events-none">VÉRIFIER</button>
        </div>

        <div id="appBody" class="hidden space-y-6">
            <div class="flex justify-between items-center px-2">
                <h2 class="font-black text-[10px] uppercase opacity-40">Mes Médicaments</h2>
                <button onclick="openModal('addMedModal')" class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold text-[10px] uppercase">+ AJOUTER</button>
            </div>
            <div id="medsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div>
            
            <div class="glass p-6">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="changeMonth(-1)" class="font-black">←</button>
                    <h3 id="calMonth" class="font-black uppercase text-xs tracking-widest text-indigo-500"></h3>
                    <button onclick="changeMonth(1)" class="font-black">→</button>
                </div>
                <div id="calendar" class="grid grid-cols-7 gap-1 md:gap-2"></div>
            </div>
        </div>
    </main>

    <div id="accountModal" class="modal-overlay" onclick="closeModal('accountModal')">
        <div class="glass p-6 w-full max-w-sm" onclick="event.stopPropagation()">
            <h3 class="font-bold mb-6 text-center uppercase text-sm">Profil</h3>
            <div class="space-y-3 mb-6">
                <input type="text" id="editLN" placeholder="Nom" class="w-full bg-slate-500/10 rounded-xl p-3 font-bold text-sm">
                <input type="text" id="editFN" placeholder="Prénom" class="w-full bg-slate-500/10 rounded-xl p-3 font-bold text-sm">
                <input type="date" id="editBD" class="w-full bg-slate-500/10 rounded-xl p-3 font-bold text-sm">
                <hr class="opacity-5 my-4">
                <input type="password" id="oldPassCheck" placeholder="Ancien mot de passe" class="w-full bg-slate-500/5 border border-indigo-500/20 rounded-xl p-3 font-bold text-sm">
                <input type="password" id="newPassSet" placeholder="Nouveau mot de passe" class="w-full bg-slate-500/10 rounded-xl p-3 font-bold text-sm">
                <button onclick="updateAccount()" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl text-xs uppercase">Sauvegarder</button>
                <button onclick="handleLogout()" class="w-full py-4 bg-slate-500/10 font-bold rounded-xl text-xs uppercase">Déconnexion</button>
                <button onclick="deleteAccount()" class="w-full py-4 text-red-500 font-bold text-[10px] uppercase">Supprimer le compte</button>
            </div>
        </div>
    </div>

    <div id="editDayModal" class="modal-overlay" onclick="closeModal('editDayModal')">
        <div class="glass p-6 w-full max-w-sm" onclick="event.stopPropagation()">
            <h3 id="editDayTitle" class="font-black mb-6 text-center uppercase text-xs text-indigo-500"></h3>
            <div id="editDayList" class="space-y-4"></div>
            <button onclick="closeModal('editDayModal')" class="w-full mt-8 py-4 bg-slate-500/10 font-bold rounded-2xl text-[10px] uppercase">Fermer</button>
        </div>
    </div>

    <div id="addMedModal" class="modal-overlay" onclick="closeModal('addMedModal')">
        <div class="glass p-6 w-full max-w-sm" onclick="event.stopPropagation()">
            <h3 class="font-bold mb-4">Nouveau Médicament</h3>
            <input type="text" id="newMedName" placeholder="Nom" class="w-full p-4 bg-slate-500/10 rounded-xl mb-3 font-bold">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <input type="number" id="newMedPieces" placeholder="Doses/Plq" class="p-4 bg-slate-500/10 rounded-xl font-bold">
                <input type="number" id="newMedPlates" placeholder="Nb Plaques" class="p-4 bg-slate-500/10 rounded-xl font-bold">
            </div>
            <input type="color" id="newMedColor" value="#6366f1" class="w-full h-12 mb-6 bg-transparent cursor-pointer">
            <button onclick="confirmAddMed()" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl uppercase text-xs">Ajouter</button>
        </div>
    </div>

    <div id="rightDrawer" class="fixed top-0 right-0 bottom-0 w-[320px] bg-white dark:bg-slate-900 z-[2500] translate-x-full transition-transform duration-300 p-6 glass border-l border-white/10">
        <h2 class="text-xl font-black italic mb-8 text-indigo-500">HISTORIQUE</h2>
        <div id="globalHistoryList" class="space-y-4 overflow-y-auto max-h-[80vh]"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc, onSnapshot, collection, getDocs, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAx7c0bFNXuBxadAUItyP6h0U",
            authDomain: "pilltracker-59495.firebaseapp.com",
            projectId: "pilltracker-59495",
            storageBucket: "pilltracker-59495.appspot.com",
            messagingSenderId: "72228771158",
            appId: "1:72228771158:web:a03f36b13f23f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let user = localStorage.getItem('medUser') || "";
        let medsData = {};
        let currentDate = new Date();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("SW OK"))
                .catch(err => console.error("SW error:", err));
        }

        // Fonctions notifications de test
        window.requestNotificationPermission = async () => {
            if (Notification.permission === "granted") {
                alert("Notifications déjà autorisées ! Tu peux tester avec 🧪");
                return;
            }
            if (Notification.permission === "denied") {
                alert("Notifications bloquées. Va dans les paramètres du navigateur (cadenas dans la barre d'adresse) pour les réactiver.");
                return;
            }

            const permission = await Notification.requestPermission();
            if (permission === "granted") {
                alert("Notifications autorisées ! 🎉 Clique sur 🧪 pour tester");
            } else {
                alert("Notifications refusées 😔");
            }
        };

        window.testNotification = () => {
            if (Notification.permission !== "granted") {
                alert("Autorise d'abord les notifications avec 🔔");
                return;
            }

            new Notification("MedTracker Pro", {
                body: "Test réussi ! 🎉\nLes notifications fonctionnent parfaitement.",
                icon: "icon.png",
                badge: "icon.png",
                tag: "test-notif"
            });
        };

        // Fonctions principales
        window.updateKey = () => {
            const ln = document.getElementById('lastName').value.trim();
            const fn = document.getElementById('firstName').value.trim();
            const bd = document.getElementById('birthDate').value;
            if (ln && fn && bd) {
                document.getElementById('passInput').classList.remove('hidden');
                document.getElementById('authBtn').classList.remove('opacity-50', 'pointer-events-none');
            }
        };

        window.handleAuth = async () => {
            const ln = document.getElementById('lastName').value.trim().toLowerCase();
            const fn = document.getElementById('firstName').value.trim().toLowerCase();
            const bd = document.getElementById('birthDate').value;
            const pw = document.getElementById('passInput').value.trim();

            const key = `\( {ln}_ \){fn}_${bd.replace(/-/g, '')}`;
            const credRef = doc(db, "credentials", key);
            const snap = await getDoc(credRef);

            if (snap.exists() && snap.data().pw !== pw) {
                return alert("Mot de passe incorrect");
            }
            if (!snap.exists()) {
                await setDoc(credRef, { pw, info: { ln, fn, bd } });
            }

            user = key;
            localStorage.setItem('medUser', user);
            location.reload();
        };

        window.updateAccount = async () => {
            const oldP = document.getElementById('oldPassCheck').value;
            const newP = document.getElementById('newPassSet').value;
            const ln = document.getElementById('editLN').value.trim().toLowerCase();
            const fn = document.getElementById('editFN').value.trim().toLowerCase();
            const bd = document.getElementById('editBD').value;

            const uSnap = await getDoc(doc(db, "credentials", user));
            if (uSnap.data().pw !== oldP) {
                return alert("Ancien mot de passe requis.");
            }

            const newKey = `\( {ln}_ \){fn}_${bd.replace(/-/g, '')}`;
            await setDoc(doc(db, "credentials", newKey), { pw: newP || oldP, info: { ln, fn, bd } });

            if (newKey !== user) {
                handleLogout();
            } else {
                alert("Profil mis à jour !");
                closeModal('accountModal');
            }
        };

        window.handleLogout = () => {
            localStorage.removeItem('medUser');
            location.reload();
        };

        window.deleteAccount = async () => {
            if (confirm("Supprimer définitivement le compte ?")) {
                await deleteDoc(doc(db, "credentials", user));
                handleLogout();
            }
        };

        // Tu peux maintenant ajouter ici toutes tes autres fonctions : renderMedCard, changeDose, renderCalendar, etc.
        // (elles sont identiques à ton code original – je ne les recopie pas pour ne pas alourdir, mais garde-les telles quelles)

        async function initApp() {
            if (!user) return;

            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('appBody').classList.remove('hidden');
            document.getElementById('accBtn').classList.remove('hidden');

            const uSnap = await getDoc(doc(db, "credentials", user));
            const i = uSnap.data().info;
            document.getElementById('editLN').value = i.ln;
            document.getElementById('editFN').value = i.fn;
            document.getElementById('editBD').value = i.bd;

            onSnapshot(collection(db, "users", user, "medications"), (snap) => {
                medsData = {};
                const grid = document.getElementById('medsGrid');
                grid.innerHTML = "";
                snap.forEach(d => {
                    const med = { id: d.id, ...d.data() };
                    medsData[med.id] = med;
                    if (med.active !== false) renderMedCard(med);
                });
                renderCalendar();
                renderHistory();
            });
        }

        if (user) initApp();
    </script>
</body>
</html>
