<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MedTracker Pro</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e1912">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --ink:#101913;
  --paper:#eef1ee;
  --paper-2:#e2e7e1;
  --card:rgba(255,255,255,0.86);
  --line:rgba(16,25,19,0.09);
  --text:#141d17;
  --text-dim:rgba(20,29,23,0.5);
  --accent:#2f6f5e;
  --accent-2:#4c8c6f;
  --amber:#c8863a;
  --red:#bd4a4a;
  --shadow:0 1px 2px rgba(16,25,19,0.06), 0 8px 24px -12px rgba(16,25,19,0.18);
  --radius:20px;
}
.dark{
  --ink:#0e1912;
  --paper:#0c1310;
  --paper-2:#111a15;
  --card:rgba(22,32,26,0.86);
  --line:rgba(255,255,255,0.08);
  --text:#eef3ef;
  --text-dim:rgba(238,243,239,0.5);
  --accent:#5fb894;
  --accent-2:#3f8567;
  --amber:#e0a458;
  --red:#e0757a;
  --shadow:0 1px 2px rgba(0,0,0,0.3), 0 12px 30px -14px rgba(0,0,0,0.6);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  margin:0; min-height:100vh; background:
    radial-gradient(circle at 15% 0%, color-mix(in srgb, var(--accent) 8%, transparent), transparent 40%),
    var(--paper);
  color:var(--text);
  font-family:'IBM Plex Sans', sans-serif;
  transition:background .5s ease, color .4s ease;
  padding:14px;
}
.display{font-family:'Space Grotesk', sans-serif;}
.mono{font-family:'IBM Plex Mono', monospace; letter-spacing:0.01em;}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
input{font-family:inherit; color:inherit;}
::selection{background:var(--accent); color:#fff;}

.glass{
  background:var(--card);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.tap{transition:transform .15s cubic-bezier(.2,.8,.2,1), background .2s, opacity .2s;}
.tap:active{transform:scale(0.93);}
.iconbtn{
  width:42px; height:42px; border-radius:14px; display:flex; align-items:center; justify-content:center;
  background:color-mix(in srgb, var(--text) 5%, transparent);
  color:var(--text);
}
.iconbtn svg{width:19px; height:19px;}
.iconbtn.solid{background:var(--accent); color:#fff;}

nav.topbar{
  max-width:900px; margin:0 auto 22px; display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px; position:relative; z-index:200;
}
.brand{display:flex; align-items:center; gap:10px;}
.brand-mark{
  width:34px; height:34px; border-radius:11px; background:linear-gradient(145deg, var(--accent), var(--accent-2));
  display:flex; align-items:center; justify-content:center; color:#fff; box-shadow:0 4px 12px -4px color-mix(in srgb, var(--accent) 70%, transparent);
}
.brand-mark svg{width:18px; height:18px;}
.brand h1{font-size:15px; margin:0; font-weight:700; letter-spacing:0.01em;}
.brand span{display:block; font-size:9px; color:var(--text-dim); font-weight:500; letter-spacing:0.14em; text-transform:uppercase; margin-top:1px;}
.nav-actions{display:flex; gap:8px;}

main{max-width:900px; margin:0 auto;}

#loginBox{max-width:380px; margin:60px auto; padding:36px 28px; text-align:center;}
.login-mark{
  width:56px; height:56px; margin:0 auto 18px; border-radius:18px; background:linear-gradient(155deg, var(--accent), var(--accent-2));
  display:flex; align-items:center; justify-content:center; color:#fff; box-shadow:0 10px 26px -10px color-mix(in srgb, var(--accent) 70%, transparent);
}
.login-mark svg{width:26px; height:26px;}
#loginBox h2{font-size:19px; margin:0 0 4px; font-weight:700;}
#loginBox p{font-size:12.5px; color:var(--text-dim); margin:0 0 24px;}
.field{position:relative; margin-bottom:11px;}
.field svg{position:absolute; left:15px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--text-dim); pointer-events:none;}
.field input{
  width:100%; padding:14px 14px 14px 42px; border-radius:14px; border:1px solid transparent;
  background:color-mix(in srgb, var(--text) 5%, transparent); font-weight:600; font-size:14px; outline:none;
  transition:border .2s, background .2s;
}
.field input:focus{border-color:color-mix(in srgb, var(--accent) 50%, transparent); background:color-mix(in srgb, var(--accent) 6%, transparent);}
.field input::placeholder{color:var(--text-dim); font-weight:500;}
.btn-primary{
  width:100%; padding:15px; border-radius:14px; background:var(--accent); color:#fff; font-weight:700; font-size:12.5px;
  letter-spacing:0.04em; text-transform:uppercase; opacity:0.35; pointer-events:none; transition:opacity .25s, transform .15s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-primary.ready{opacity:1; pointer-events:auto;}
.btn-primary svg{width:15px; height:15px;}
.btn-ghost{
  width:100%; padding:15px; border-radius:14px; background:color-mix(in srgb, var(--text) 6%, transparent); font-weight:700; font-size:11.5px;
  letter-spacing:0.04em; text-transform:uppercase; display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-danger-text{color:var(--red); font-weight:700; font-size:10.5px; letter-spacing:0.05em; text-transform:uppercase; padding:12px;}

.section-head{display:flex; align-items:center; justify-content:between; justify-content:space-between; padding:2px 4px 14px;}
.section-head .eyebrow{font-size:10px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-dim); display:flex; align-items:center; gap:8px;}
.section-head .eyebrow .dot{width:6px; height:6px; border-radius:50%; background:var(--accent);}
.btn-add{
  background:var(--accent); color:#fff; padding:10px 16px; border-radius:13px; font-weight:700; font-size:10.5px;
  letter-spacing:0.05em; text-transform:uppercase; display:flex; align-items:center; gap:6px; box-shadow:0 6px 16px -8px color-mix(in srgb, var(--accent) 70%, transparent);
}
.btn-add svg{width:13px; height:13px;}

#medsGrid{display:grid; grid-template-columns:repeat(auto-fit, minmax(240px,1fr)); gap:14px; margin-bottom:26px;}
.empty-state{
  grid-column:1/-1; text-align:center; padding:44px 20px; color:var(--text-dim); font-size:12.5px; font-weight:500;
}
.empty-state svg{width:34px; height:34px; margin:0 auto 12px; opacity:0.5;}

.med-card{padding:18px; position:relative; overflow:hidden; animation:cardin .4s cubic-bezier(.2,.8,.2,1) both;}
@keyframes cardin{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}
.med-card::before{content:""; position:absolute; top:0; left:0; width:4px; height:100%; background:var(--med-color, var(--accent));}
.med-top{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; gap:8px;}
.med-name{font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:0.02em; color:var(--med-color); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.stock-tag{
  font-size:8px; font-weight:800; letter-spacing:0.06em; text-transform:uppercase; padding:4px 8px; border-radius:8px; color:#fff;
  display:flex; align-items:center; gap:3px; white-space:nowrap; flex-shrink:0;
}
.stock-tag.warn{background:var(--amber);}
.stock-tag.urgent{background:var(--red); animation:softpulse 1.8s infinite;}
@keyframes softpulse{0%,100%{opacity:1;} 50%{opacity:0.55;}}
.progress-track{height:7px; width:100%; background:color-mix(in srgb, var(--text) 7%, transparent); border-radius:10px; overflow:hidden; margin-bottom:10px;}
.progress-fill{height:100%; border-radius:10px; background:var(--med-color, var(--accent)); transition:width .6s cubic-bezier(.2,.8,.2,1);}
.med-meta{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
.med-meta .plate{font-size:9px; font-weight:600; color:var(--text-dim);}
.med-meta .pct{font-size:11px; font-weight:700; color:var(--med-color);}
.dose-row{display:flex; align-items:center; justify-content:center; gap:18px;}
.dose-btn{
  width:44px; height:44px; border-radius:16px; background:color-mix(in srgb, var(--text) 6%, transparent);
  display:flex; align-items:center; justify-content:center; font-weight:800;
}
.dose-btn svg{width:16px; height:16px;}
.dose-btn.plus{color:var(--med-color);}
.dose-count{text-align:center; min-width:52px;}
.dose-count .n{font-size:26px; font-weight:700;}
.dose-count .d{font-size:9px; color:var(--text-dim); font-weight:600;}

.cal-card{padding:22px;}
.cal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;}
.cal-head h3{font-size:12px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--accent); margin:0;}
.cal-nav{width:32px; height:32px; border-radius:11px; background:color-mix(in srgb, var(--text) 6%, transparent); display:flex; align-items:center; justify-content:center;}
.cal-nav svg{width:14px; height:14px;}
.weekday-row{display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:6px;}
.weekday-row span{font-size:8.5px; text-align:center; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.04em;}
#calendar{display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}

.blister-cell{
  aspect-ratio:1/1; border-radius:50%; border:1.5px dashed var(--line); display:flex; flex-direction:column;
  align-items:center; justify-content:center; position:relative; cursor:pointer; transition:transform .18s, background .2s, border-color .2s;
  background:color-mix(in srgb, var(--text) 2.5%, transparent);
}
.blister-cell:hover{transform:translateY(-2px); border-color:color-mix(in srgb, var(--accent) 45%, transparent);}
.blister-cell:active{transform:scale(0.92);}
.blister-cell.has-doses{border-style:solid; border-color:transparent; background:color-mix(in srgb, var(--accent) 10%, transparent);}
.blister-cell .daynum{font-size:9px; font-weight:600; color:var(--text-dim); position:absolute; top:5px; left:0; right:0; text-align:center;}
.blister-dots{display:flex; gap:2px; margin-top:3px; flex-wrap:wrap; justify-content:center; max-width:80%;}
.blister-dots span{width:5px; height:5px; border-radius:50%; display:inline-block;}
.blister-total{font-size:9px; font-weight:700; color:var(--accent); margin-top:1px;}
.blister-cell.empty-cell{visibility:hidden;}

.modal-overlay{
  position:fixed; inset:0; background:color-mix(in srgb, var(--ink) 70%, transparent); backdrop-filter:blur(6px);
  z-index:5000; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .25s;
}
.modal-overlay.open{opacity:1; pointer-events:auto;}
.modal-overlay .sheet{
  transform:translateY(14px) scale(0.97); transition:transform .28s cubic-bezier(.2,.8,.2,1);
}
.modal-overlay.open .sheet{transform:translateY(0) scale(1);}
.sheet{padding:26px; width:100%; max-width:380px; max-height:86vh; overflow-y:auto;}
.sheet h3{font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; margin:0 0 20px; text-align:center; color:var(--accent);}
.sheet-close{position:absolute; top:16px; right:16px;}

.day-item{padding:14px 16px; border-radius:16px; background:color-mix(in srgb, var(--text) 4%, transparent); display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
.day-item .name{font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.02em;}
.day-item .count{font-size:11px; font-weight:600; color:var(--text-dim); margin-top:2px;}
.day-item .btns{display:flex; gap:6px;}
.day-item .btns button{width:36px; height:36px; border-radius:12px; background:color-mix(in srgb, var(--text) 7%, transparent); display:flex; align-items:center; justify-content:center;}
.day-item .btns button svg{width:14px; height:14px;}

.grid-2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.color-field{position:relative; height:52px; border-radius:14px; overflow:hidden; margin-bottom:20px; border:1px solid var(--line);}
.color-field input[type=color]{position:absolute; inset:-4px; width:calc(100% + 8px); height:calc(100% + 8px); border:none; cursor:pointer; padding:0;}
.color-field .cf-label{position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:10px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,0.4); pointer-events:none; z-index:2;}

#rightDrawer{
  position:fixed; top:0; right:0; bottom:0; width:min(340px,88vw); z-index:2500; transform:translateX(105%);
  transition:transform .35s cubic-bezier(.2,.8,.2,1); padding:26px 20px; border-left:1px solid var(--line);
}
#rightDrawer.open{transform:translateX(0);}
#rightDrawer h2{font-size:15px; font-weight:700; margin:0 0 6px; color:var(--accent);}
#rightDrawer p.sub{font-size:11px; color:var(--text-dim); margin:0 0 20px;}
.hist-item{padding:14px; border-radius:15px; background:color-mix(in srgb, var(--text) 4%, transparent); margin-bottom:10px;}
.hist-item .row{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
.hist-item .name{font-size:10.5px; font-weight:700; text-transform:uppercase;}
.hist-item .actions{display:flex; gap:10px;}
.hist-item .actions button{font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; color:var(--text-dim);}
.hist-item .actions button.danger{color:var(--red);}
.hist-item .boxrow{display:flex; justify-content:space-between; align-items:center; font-size:10px; font-weight:600; color:var(--text-dim);}
.hist-item .boxrow input{width:46px; background:color-mix(in srgb, var(--text) 8%, transparent); border-radius:8px; padding:6px; text-align:center; font-weight:700; border:none;}
#drawerOverlay{position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:1500; display:none;}

#toastHost{position:fixed; bottom:22px; left:0; right:0; z-index:9000; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none; padding:0 16px;}
.toast{
  max-width:380px; width:100%; padding:14px 18px; border-radius:15px; font-size:12.5px; font-weight:600; display:flex; align-items:center; gap:10px;
  background:var(--ink); color:#eef3ef; box-shadow:0 12px 30px -10px rgba(0,0,0,0.4); opacity:0; transform:translateY(10px); transition:opacity .3s, transform .3s;
}
.toast.show{opacity:1; transform:translateY(0);}
.toast svg{width:16px; height:16px; flex-shrink:0;}
.toast.error{background:var(--red);}
.toast.success svg{color:var(--accent-2);}

#confirmOverlay .sheet{max-width:340px; text-align:center;}
#confirmOverlay p{font-size:13px; color:var(--text-dim); margin:0 0 22px; line-height:1.5;}
.confirm-btns{display:flex; gap:10px;}
.confirm-btns button{flex:1; padding:14px; border-radius:13px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em;}
.confirm-btns .cancel{background:color-mix(in srgb, var(--text) 6%, transparent);}
.confirm-btns .ok{background:var(--red); color:#fff;}

.skeleton{background:linear-gradient(90deg, color-mix(in srgb, var(--text) 6%, transparent) 25%, color-mix(in srgb, var(--text) 10%, transparent) 37%, color-mix(in srgb, var(--text) 6%, transparent) 63%); background-size:400% 100%; animation:shimmer 1.4s ease infinite; border-radius:16px; height:160px;}
@keyframes shimmer{0%{background-position:100% 0;} 100%{background-position:0 0;}}

@media (prefers-reduced-motion:reduce){*{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}}
</style>
</head>
<body>
<div id="toastHost"></div>
<div id="drawerOverlay" onclick="closeDrawers()"></div>

<nav class="topbar glass">
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.5 20.5 3.5 13.5a5 5 0 0 1 7-7l7 7a5 5 0 0 1-7 7Z"/><path d="M8 9l7 7"/></svg>
    </div>
    <div>
      <h1>MedTracker</h1>
      <span>Suivi de traitement</span>
    </div>
  </div>
  <div class="nav-actions">
    <button onclick="openModal('accountModal')" id="accBtn" class="iconbtn tap" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
    </button>
    <button onclick="requestNotificationPermission()" id="notifBtn" class="iconbtn tap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </button>
    <button onclick="openRightDrawer()" class="iconbtn tap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    </button>
    <button onclick="toggleTheme()" id="themeBtn" class="iconbtn tap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 1 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    </button>
  </div>
</nav>

<main>
  <div id="loginBox" class="glass">
    <div class="login-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.5 20.5 3.5 13.5a5 5 0 0 1 7-7l7 7a5 5 0 0 1-7 7Z"/><path d="M8 9l7 7"/></svg>
    </div>
    <h2>Accès sécurisé</h2>
    <p>Identifiez-vous pour retrouver votre suivi</p>
    <div class="field">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
      <input type="text" id="lastName" oninput="updateKey()" placeholder="Nom">
    </div>
    <div class="field">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
      <input type="text" id="firstName" oninput="updateKey()" placeholder="Prénom">
    </div>
    <div class="field">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
      <input type="date" id="birthDate" oninput="updateKey()">
    </div>
    <div class="field" id="passField" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
      <input type="password" id="passInput" placeholder="Mot de passe">
    </div>
    <button id="authBtn" onclick="handleAuth()" class="btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      Vérifier
    </button>
  </div>

  <div id="appBody" style="display:none">
    <div class="section-head">
      <div class="eyebrow"><span class="dot"></span>Mes médicaments</div>
      <button onclick="openModal('addMedModal')" class="btn-add tap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Ajouter
      </button>
    </div>
    <div id="medsGrid"></div>
    <div class="cal-card glass">
      <div class="cal-head">
        <button onclick="changeMonth(-1)" class="cal-nav tap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        <h3 id="calMonth"></h3>
        <button onclick="changeMonth(1)" class="cal-nav tap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
      </div>
      <div class="weekday-row"><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span><span>D</span></div>
      <div id="calendar"></div>
    </div>
  </div>
</main>

<div id="accountModal" class="modal-overlay" onclick="closeModal('accountModal')">
  <div class="glass sheet" onclick="event.stopPropagation()">
    <h3>Profil</h3>
    <div class="field"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg><input type="text" id="editLN" placeholder="Nom"></div>
    <div class="field"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg><input type="text" id="editFN" placeholder="Prénom"></div>
    <div class="field"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M8 3v4M16 3v4M3 10h18"/></svg><input type="date" id="editBD"></div>
    <div style="height:1px; background:var(--line); margin:16px 0;"></div>
    <div class="field"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg><input type="password" id="oldPassCheck" placeholder="Ancien mot de passe"></div>
    <div class="field"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg><input type="password" id="newPassSet" placeholder="Nouveau mot de passe"></div>
    <button onclick="updateAccount()" class="btn-primary ready" style="margin-bottom:10px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
      Sauvegarder
    </button>
    <button onclick="handleLogout()" class="btn-ghost" style="margin-bottom:10px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      Déconnexion
    </button>
    <button onclick="deleteAccount()" class="btn-danger-text" style="width:100%;">Supprimer le compte</button>
  </div>
</div>

<div id="editDayModal" class="modal-overlay" onclick="closeModal('editDayModal')">
  <div class="glass sheet" onclick="event.stopPropagation()">
    <h3 id="editDayTitle"></h3>
    <div id="editDayList"></div>
    <button onclick="closeModal('editDayModal')" class="btn-ghost" style="margin-top:6px;">Fermer</button>
  </div>
</div>

<div id="addMedModal" class="modal-overlay" onclick="closeModal('addMedModal')">
  <div class="glass sheet" onclick="event.stopPropagation()">
    <h3>Nouveau médicament</h3>
    <div class="field"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.5 20.5 3.5 13.5a5 5 0 0 1 7-7l7 7a5 5 0 0 1-7 7Z"/><path d="M8 9l7 7"/></svg><input type="text" id="newMedName" placeholder="Nom du médicament"></div>
    <div class="grid-2" style="margin-bottom:14px;">
      <input type="number" id="newMedPieces" placeholder="Doses / plq" style="padding:14px; border-radius:14px; background:color-mix(in srgb, var(--text) 5%, transparent); font-weight:600; font-size:13px; outline:none; border:none;">
      <input type="number" id="newMedPlates" placeholder="Nb plaques" style="padding:14px; border-radius:14px; background:color-mix(in srgb, var(--text) 5%, transparent); font-weight:600; font-size:13px; outline:none; border:none;">
    </div>
    <div class="color-field">
      <span class="cf-label">Couleur</span>
      <input type="color" id="newMedColor" value="#2f6f5e">
    </div>
    <button onclick="confirmAddMed()" class="btn-primary ready">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Ajouter
    </button>
  </div>
</div>

<div id="confirmOverlay" class="modal-overlay">
  <div class="glass sheet" onclick="event.stopPropagation()">
    <h3 id="confirmTitle">Confirmer</h3>
    <p id="confirmMsg"></p>
    <div class="confirm-btns">
      <button class="cancel tap" id="confirmCancelBtn">Annuler</button>
      <button class="ok tap" id="confirmOkBtn">Confirmer</button>
    </div>
  </div>
</div>

<div id="rightDrawer" class="glass">
  <h2>Historique</h2>
  <p class="sub">Boîtes et statut de vos traitements</p>
  <div id="globalHistoryList" style="overflow-y:auto; max-height:75vh;"></div>
</div>

<script>
const ICON = {
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>',
  alert:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01"/><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/></svg>',
  minus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  pill:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.5 20.5 3.5 13.5a5 5 0 0 1 7-7l7 7a5 5 0 0 1-7 7Z"/><path d="M8 9l7 7"/></svg>',
  empty:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M8 14h8"/></svg>'
};

function showToast(message, type){
  type = type || 'info';
  const host = document.getElementById('toastHost');
  const t = document.createElement('div');
  t.className = 'toast ' + (type === 'error' ? 'error' : type === 'success' ? 'success' : '');
  t.innerHTML = (type === 'error' ? ICON.alert : ICON.check) + '<span>' + message + '</span>';
  host.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3200);
}

function askConfirm(message, title){
  return new Promise(resolve => {
    const overlay = document.getElementById('confirmOverlay');
    document.getElementById('confirmTitle').innerText = title || 'Confirmer';
    document.getElementById('confirmMsg').innerText = message;
    overlay.classList.add('open');
    const okBtn = document.getElementById('confirmOkBtn');
    const cancelBtn = document.getElementById('confirmCancelBtn');
    const cleanup = (val) => { overlay.classList.remove('open'); okBtn.onclick = null; cancelBtn.onclick = null; resolve(val); };
    okBtn.onclick = () => cleanup(true);
    cancelBtn.onclick = () => cleanup(false);
  });
}

window.addEventListener('load', () => {
  if (typeof supabase === 'undefined') {
    showToast("Erreur : Supabase non chargé.", 'error');
    return;
  }

  const sb = supabase.createClient(
    'https://jyjjlaqmmfmoqrxcbizy.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5ampsYXFtbWZtb3FyeGNiaXp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDIzMTksImV4cCI6MjA5OTE3ODMxOX0.XPVACZLMNcdYcZBhNbuHdql6NBMRdgZDuhHKZfxNM6I'
  );

  let user = localStorage.getItem('medUser') || "";
  let medsData = {}, currentDate = new Date();

  if (localStorage.getItem('medTheme') === 'dark') {
    document.body.classList.add('dark');
  }
  updateThemeIcon();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  window.requestNotificationPermission = async () => {
    const permission = await Notification.requestPermission();
    if (permission === "granted") {
      showToast("Notifications autorisées", 'success');
      new Notification('MedTracker', { body: 'Notifications actives', icon: 'icon.png' });
    } else if (permission === "denied") {
      showToast("Notifications refusées", 'error');
    }
  };

  window.updateKey = () => {
    const ln = document.getElementById('lastName').value.trim(), fn = document.getElementById('firstName').value.trim(), bd = document.getElementById('birthDate').value;
    if (ln && fn && bd) {
      document.getElementById('passField').style.display = 'block';
      document.getElementById('authBtn').classList.add('ready');
    } else {
      document.getElementById('passField').style.display = 'none';
      document.getElementById('authBtn').classList.remove('ready');
    }
  };

  window.handleAuth = async () => {
    const ln = document.getElementById('lastName').value.trim().toLowerCase(), fn = document.getElementById('firstName').value.trim().toLowerCase(), bd = document.getElementById('birthDate').value, pw = document.getElementById('passInput').value.trim();
    const key = `${ln}_${fn}_${bd.replace(/-/g, '')}`;
    const { data, error } = await sb.from('credentials').select('pw').eq('key', key).single();
    if (error && error.code !== 'PGRST116') { showToast("Erreur base de données : " + error.message, 'error'); return; }
    if (data) {
      if (data.pw !== pw) return showToast("Mot de passe incorrect", 'error');
    } else {
      const { error: insertErr } = await sb.from('credentials').insert({ key, pw, info: { ln, fn, bd } });
      if (insertErr) { showToast("Erreur création compte : " + insertErr.message, 'error'); return; }
    }
    user = key;
    localStorage.setItem('medUser', user);
    location.reload();
  };

  window.updateAccount = async () => {
    const oldP = document.getElementById('oldPassCheck').value, newP = document.getElementById('newPassSet').value, ln = document.getElementById('editLN').value, fn = document.getElementById('editFN').value, bd = document.getElementById('editBD').value;
    const { data: u } = await sb.from('credentials').select('pw').eq('key', user).single();
    if (u.pw !== oldP) return showToast("Ancien mot de passe requis", 'error');
    const newKey = `${ln.toLowerCase()}_${fn.toLowerCase()}_${bd.replace(/-/g, '')}`;
    await sb.from('credentials').update({ pw: newP || oldP, info: { ln, fn, bd } }).eq('key', user);
    if (newKey !== user) { handleLogout(); } else { showToast("Profil mis à jour", 'success'); closeModal('accountModal'); }
  };

  window.deleteAccount = async () => {
    const ok = await askConfirm("Cette action est définitive et supprimera votre compte.", "Supprimer le compte ?");
    if (ok) {
      await sb.from('credentials').delete().eq('key', user);
      handleLogout();
    }
  };

  async function initApp() {
    if (!user) return;
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('appBody').style.display = 'block';
    document.getElementById('accBtn').style.display = 'flex';
    document.getElementById('medsGrid').innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>';
    const { data: u } = await sb.from('credentials').select('info').eq('key', user).single();
    if (u) {
      const i = u.info;
      document.getElementById('editLN').value = i.ln; document.getElementById('editFN').value = i.fn; document.getElementById('editBD').value = i.bd;
    }
    await loadMeds();
  }

  async function loadMeds() {
    const { data: meds, error } = await sb.from('medications').select('*').eq('user_key', user);
    if (error) {
      showToast("Erreur chargement médicaments : " + error.message, 'error');
      return;
    }
    medsData = {};
    (meds || []).forEach(m => { medsData[m.id] = m; });
    await renderAllMeds();
    renderCalendar();
    renderHistory();
  }

  async function renderAllMeds() {
    const grid = document.getElementById('medsGrid'); grid.innerHTML = "";
    const activeMeds = Object.values(medsData).filter(m => m.active !== false);
    if (!activeMeds.length) {
      grid.innerHTML = `<div class="empty-state">${ICON.empty}<div>Aucun médicament suivi pour le moment.<br>Ajoutez-en un pour commencer.</div></div>`;
      return;
    }
    for (const m of activeMeds) await renderMedCard(m);
  }

  async function renderMedCard(med) {
    const card = document.createElement('div'); card.className = "glass med-card"; card.style.setProperty('--med-color', med.color);
    document.getElementById('medsGrid').appendChild(card);

    const { count: doseCount, error } = await sb
      .from('medication_doses')
      .select('*', { count: 'exact', head: true })
      .eq('medication_id', med.id);
    if (error) { console.error(error); return; }
    const count = doseCount || 0;
    const total = med.pieces_per_plate * med.plates_per_box;
    const prog = total ? (count / total) * 100 : 0;
    const plateIdx = Math.floor(count / med.pieces_per_plate) + 1;
    let tag = prog >= 90 ? `<div class="stock-tag urgent">${ICON.alert}Urgent</div>` : prog >= 80 ? `<div class="stock-tag warn">${ICON.alert}Stock bas</div>` : "";
    card.innerHTML = `<div class="med-top"><div class="med-name">${med.name}</div>${tag}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${prog}%"></div></div>
      <div class="med-meta"><span class="plate">Plaquette ${plateIdx}</span><span class="pct">${Math.round(prog)}%</span></div>
      <div class="dose-row">
        <button onclick="changeDose('${med.id}', -1)" class="dose-btn tap">${ICON.minus}</button>
        <div class="dose-count"><div class="n mono">${count % med.pieces_per_plate}</div><div class="d">/ ${med.pieces_per_plate}</div></div>
        <button onclick="changeDose('${med.id}', 1)" class="dose-btn plus tap">${ICON.plus}</button>
      </div>`;
  }

  window.changeDose = async (id, val, date = null) => {
    const med = medsData[id];
    if (!med) return;
    const d = date || new Date().toISOString().split('T')[0];
    const { count: currentCount } = await sb.from('medication_doses').select('*', { count: 'exact', head: true }).eq('medication_id', id);
    const maxTotal = med.pieces_per_plate * med.plates_per_box;

    if (val > 0) {
      if ((currentCount || 0) >= maxTotal) {
        const ok = await askConfirm("Voulez-vous démarrer une nouvelle boîte ?", "Boîte terminée");
        if (ok) {
          await sb.from('medication_doses').delete().eq('medication_id', id);
          await sb.from('medications').update({ box_count: (med.box_count || 1) + 1 }).eq('id', id);
        }
        await loadMeds();
        return;
      }
      const { error: insertErr } = await sb.from('medication_doses').insert({ medication_id: id });
      if (insertErr) { showToast("Erreur ajout dose : " + insertErr.message, 'error'); return; }
    } else {
      const { data: last } = await sb.from('medication_doses').select('id').eq('medication_id', id).order('id', { ascending: false }).limit(1).single();
      if (last) await sb.from('medication_doses').delete().eq('id', last.id);
    }

    const { count: newCount } = await sb.from('medication_doses').select('*', { count: 'exact', head: true }).eq('medication_id', id);
    const { data: exist } = await sb.from('medication_history').select('count').eq('medication_id', id).eq('date', d).single();
    if (exist) {
      await sb.from('medication_history').update({ count: Math.max(0, exist.count + val), cumulative: newCount, color: med.color }).eq('medication_id', id).eq('date', d);
    } else if (val > 0) {
      await sb.from('medication_history').insert({ medication_id: id, date: d, count: 1, cumulative: newCount, color: med.color });
    }
    await loadMeds();
  };

  async function renderCalendar() {
    const cal = document.getElementById('calendar'), y = currentDate.getFullYear(), m = currentDate.getMonth();
    cal.innerHTML = "";
    document.getElementById('calMonth').innerText = new Intl.DateTimeFormat('fr', { month: 'long', year: 'numeric' }).format(currentDate);
    const first = (new Date(y, m, 1).getDay() + 6) % 7;
    for (let i = 0; i < first; i++) {
      const empty = document.createElement('div'); empty.className = 'blister-cell empty-cell'; cal.appendChild(empty);
    }

    const startDate = `${y}-${String(m+1).padStart(2,'0')}-01`;
    const endDate = `${y}-${String(m+1).padStart(2,'0')}-${new Date(y, m+1, 0).getDate()}`;
    const medIds = Object.keys(medsData);
    const { data: hist } = medIds.length ? await sb.from('medication_history').select('*').in('medication_id', medIds).gte('date', startDate).lte('date', endDate) : { data: [] };
    const map = {};
    (hist || []).forEach(h => { const key = `${h.date}_${h.medication_id}`; map[key] = h; });

    const todayStr = new Date().toISOString().split('T')[0];

    for (let d = 1; d <= new Date(y, m + 1, 0).getDate(); d++) {
      const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cell = document.createElement('div'); cell.className = "blister-cell"; cell.onclick = () => openDayEdit(dateStr);
      if (dateStr === todayStr) cell.style.borderColor = 'var(--accent)';
      let dots = '', total = 0;
      for (let id in medsData) {
        const h = map[`${dateStr}_${id}`];
        if (h) {
          dots += `<span style="background:${h.color || medsData[id].color}"></span>`;
          total += h.count;
        }
      }
      if (total > 0) cell.classList.add('has-doses');
      cell.innerHTML = `<span class="daynum">${d}</span><div class="blister-dots">${dots}</div>${total > 0 ? `<span class="blister-total mono">${total}</span>` : ''}`;
      cal.appendChild(cell);
    }
  }

  window.openDayEdit = async (date) => {
    const list = document.getElementById('editDayList'); list.innerHTML = "";
    document.getElementById('editDayTitle').innerText = new Intl.DateTimeFormat('fr', { weekday:'long', day:'numeric', month:'long' }).format(new Date(date + 'T00:00:00'));
    const activeMeds = Object.values(medsData).filter(m => m.active !== false);
    if (!activeMeds.length) {
      list.innerHTML = `<div class="empty-state">${ICON.empty}<div>Aucun médicament actif</div></div>`;
    }
    for (const m of activeMeds) {
      const item = document.createElement('div'); item.className = "day-item";
      const { data: h } = await sb.from('medication_history').select('count').eq('medication_id', m.id).eq('date', date).single();
      const val = h ? h.count : 0;
      item.innerHTML = `<div><div class="name" style="color:${m.color}">${m.name}</div><div class="count">${val} prise${val > 1 ? 's' : ''}</div></div>
        <div class="btns">
          <button onclick="changeDose('${m.id}', -1, '${date}')" class="tap">${ICON.minus}</button>
          <button onclick="changeDose('${m.id}', 1, '${date}')" class="tap" style="color:${m.color}">${ICON.plus}</button>
        </div>`;
      list.appendChild(item);
    }
    openModal('editDayModal');
  };

  function renderHistory() {
    const list = document.getElementById('globalHistoryList'); list.innerHTML = "";
    const all = Object.values(medsData);
    if (!all.length) {
      list.innerHTML = `<div class="empty-state" style="padding:30px 10px;">${ICON.empty}<div>Rien à afficher pour l'instant</div></div>`;
      return;
    }
    for (const m of all) {
      const item = document.createElement('div'); item.className = 'hist-item';
      item.innerHTML = `<div class="row"><span class="name" style="color:${m.color}">${m.name}</span>
        <div class="actions">
          <button onclick="toggleArchive('${m.id}', ${m.active})" class="tap">${m.active === false ? 'Activer' : 'Archiver'}</button>
          <button onclick="deleteMed('${m.id}')" class="danger tap">Suppr.</button>
        </div></div>
        <div class="boxrow"><span>Boîtes :</span><input type="number" value="${m.box_count || 1}" onchange="updateBox('${m.id}', this.value)"></div>`;
      list.appendChild(item);
    }
  }

  window.updateBox = async (id, val) => {
    await sb.from('medications').update({ box_count: parseInt(val) }).eq('id', id);
    loadMeds();
  };
  window.toggleArchive = async (id, s) => {
    await sb.from('medications').update({ active: s === false }).eq('id', id);
    loadMeds();
  };
  window.deleteMed = async (id) => {
    const ok = await askConfirm("Ce médicament et son historique seront supprimés.", "Supprimer ce médicament ?");
    if (ok) { await sb.from('medications').delete().eq('id', id); showToast("Médicament supprimé", 'success'); loadMeds(); }
  };
  window.confirmAddMed = async () => {
    const n = document.getElementById('newMedName').value.trim();
    const pi = parseInt(document.getElementById('newMedPieces').value);
    const pl = parseInt(document.getElementById('newMedPlates').value) || 1;
    const c = document.getElementById('newMedColor').value;
    if (!n || !pi) return showToast("Nom et doses/plaquette obligatoires", 'error');
    const { error } = await sb.from('medications').insert({ user_key: user, name: n, pieces_per_plate: pi, plates_per_box: pl, color: c, active: true, box_count: 1 });
    if (error) {
      showToast("Erreur ajout médicament : " + error.message, 'error');
      return;
    }
    document.getElementById('newMedName').value = '';
    document.getElementById('newMedPieces').value = '';
    document.getElementById('newMedPlates').value = '';
    showToast("Médicament ajouté", 'success');
    closeModal('addMedModal');
    loadMeds();
  };

  window.openRightDrawer = () => {
    document.getElementById('rightDrawer').classList.add('open');
    document.getElementById('drawerOverlay').style.display = 'block';
  };
  window.closeDrawers = () => {
    document.getElementById('rightDrawer').classList.remove('open');
    document.getElementById('drawerOverlay').style.display = 'none';
  };
  window.openModal = (id) => document.getElementById(id).classList.add('open');
  window.closeModal = (id) => document.getElementById(id).classList.remove('open');
  window.changeMonth = (v) => { currentDate.setMonth(currentDate.getMonth() + v); renderCalendar(); };

  function updateThemeIcon(){
    const isDark = document.body.classList.contains('dark');
    document.getElementById('themeBtn').innerHTML = isDark
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 3a6 6 0 1 0 9 9 9 9 0 1 1-9-9Z"/></svg>';
  }
  window.toggleTheme = () => {
    document.body.classList.toggle('dark');
    localStorage.setItem('medTheme', document.body.classList.contains('dark') ? 'dark' : 'light');
    updateThemeIcon();
  };
  window.handleLogout = () => { localStorage.removeItem('medUser'); location.reload(); };

  if (user) initApp();
});
</script>
</body>
</html>
