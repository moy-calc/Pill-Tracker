<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
:root {
--bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
--card: rgba(255, 255, 255, 0.85);
--text: #0f172a;
--border: rgba(255, 255, 255, 0.8);
--shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
}
.dark {
--bg-gradient: linear-gradient(135deg, #0f172a 0%, #020617 100%);
--card: rgba(30, 41, 59, 0.75);
--text: #f8fafc;
--border: rgba(255, 255, 255, 0.08);
--shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
}
body {
background: var(--bg-gradient);
background-attachment: fixed;
color: var(--text);
font-family: 'Plus Jakarta Sans', sans-serif;
transition: background 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
min-height: 100vh;
-webkit-tap-highlight-color: transparent;
}
@keyframes fadeInUp {
0% { opacity: 0; transform: translateY(40px) scale(0.95); }
100% { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes slideInRight {
0% { opacity: 0; transform: translateX(50px) scale(0.98); }
100% { opacity: 1; transform: translateX(0) scale(1); }
}
@keyframes popIn {
0% { opacity: 0; transform: scale(0.8) translateY(10px); }
70% { transform: scale(1.05) translateY(-5px); }
100% { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes floatBounce {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-8px); }
}
.glass {
background: var(--card);
backdrop-filter: blur(24px);
-webkit-backdrop-filter: blur(24px);
border: 1px solid var(--border);
border-radius: 24px;
box-shadow: var(--shadow);
transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.glass:hover {
box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.2);
transform: translateY(-6px) scale(1.01);
}
.dark .glass:hover {
box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8);
}
.progress-container {
height: 10px;
width: 100%;
background: rgba(148, 163, 184, 0.2);
border-radius: 99px;
overflow: hidden;
position: relative;
box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
}
.progress-bar {
height: 100%;
border-radius: 99px;
transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.cal-cell {
min-height: 80px;
border-radius: 16px;
display: flex;
flex-direction: column;
padding: 8px;
border: 1px solid var(--border);
cursor: pointer;
transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.cal-cell:active {
transform: scale(0.9) !important;
}
.cal-cell:hover {
background: rgba(148, 163, 184, 0.2);
transform: translateY(-6px) scale(1.05);
box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.15);
}
.ratio-badge {
font-size: 0.7rem;
padding: 3px 8px;
border-radius: 8px;
color: white;
margin-bottom: 3px;
font-weight: 800;
text-align: center;
box-shadow: 0 4px 10px rgba(0,0,0,0.2);
letter-spacing: 0.5px;
animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.modal-overlay {
position: fixed;
inset: 0;
background: rgba(2, 6, 23, 0.7);
backdrop-filter: blur(0px);
-webkit-backdrop-filter: blur(0px);
z-index: 6000;
display: flex;
align-items: center;
justify-content: center;
padding: 16px;
opacity: 0;
visibility: hidden;
pointer-events: none;
transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.modal-overlay.z-top {
z-index: 7000;
}
.modal-overlay.open {
opacity: 1;
visibility: visible;
pointer-events: auto;
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
}
.modal-content {
opacity: 0;
transform: translateY(80px) scale(0.8);
transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
width: 100%;
max-width: 420px;
}
.modal-overlay.open .modal-content {
opacity: 1;
transform: translateY(0) scale(1);
}
@keyframes pulse-soft {
0%, 100% { opacity: 1; transform: scale(1); }
50% { opacity: 0.85; transform: scale(1.1); }
}
.alert-stock {
animation: pulse-soft 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
font-size: 11px;
font-weight: 800;
padding: 5px 12px;
border-radius: 10px;
letter-spacing: 0.5px;
}
.toast {
position: fixed;
top: 24px;
left: 50%;
transform: translateX(-50%) translateY(-150px) scale(0.5);
background: var(--text);
color: var(--bg-gradient);
padding: 16px 28px;
border-radius: 100px;
font-weight: 800;
font-size: 14px;
z-index: 9999;
transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
box-shadow: 0 25px 50px rgba(0,0,0,0.25);
display: flex;
align-items: center;
gap: 14px;
width: max-content;
max-width: 90%;
opacity: 0;
}
.toast.show {
transform: translateX(-50%) translateY(0) scale(1);
opacity: 1;
}
input, select {
color: var(--text);
appearance: none;
-webkit-appearance: none;
font-size: 15px !important;
transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
input:focus {
transform: scale(1.03);
box-shadow: 0 15px 35px -5px rgba(99, 102, 241, 0.2);
}
input[type="color"] {
padding: 0;
border: none;
border-radius: 14px;
overflow: hidden;
cursor: pointer;
box-shadow: inset 0 3px 6px rgba(0,0,0,0.15);
}
input[type="color"]::-webkit-color-swatch-wrapper {
padding: 0;
}
input[type="color"]::-webkit-color-swatch {
border: none;
border-radius: 14px;
}
.action-btn {
transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.action-btn:active {
transform: scale(0.85) !important;
}
.action-btn:hover {
transform: translateY(-5px) scale(1.05);
box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.25);
}
.dose-anim {
transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
display: inline-block;
}
.hide-scroll::-webkit-scrollbar {
display: none;
}
.hide-scroll {
-ms-overflow-style: none;
scrollbar-width: none;
}
.valid-input {
border-color: #22c55e !important;
background-color: rgba(34, 197, 94, 0.08) !important;
}
#drawerOverlay {
transition: opacity 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
}
</style>
</head>
<body class="p-3 sm:p-5 lg:p-6">
<div id="inAppAlarm" class="fixed top-0 left-0 right-0 p-4 z-[9999] transform -translate-y-full transition-transform duration-700 cubic-bezier(0.34, 1.56, 0.64, 1) flex justify-center">
<div class="glass px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-5 border-2 border-indigo-500/50">
<div class="w-14 h-14 rounded-full bg-indigo-500/20 text-indigo-500 flex items-center justify-center animate-pulse" style="animation: floatBounce 2s infinite ease-in-out;">
<i class="ph-fill ph-alarm text-3xl"></i>
</div>
<div>
<h4 class="font-black text-indigo-500 text-lg tracking-tight">Rappel Médicament</h4>
<p class="text-sm font-bold opacity-80" id="alarmText">C'est l'heure de votre prise !</p>
</div>
<button onclick="closeAlarm()" class="ml-4 w-12 h-12 bg-slate-500/10 hover:bg-slate-500/20 rounded-xl flex items-center justify-center action-btn">
<i class="ph ph-x text-xl font-bold"></i>
</button>
</div>
</div>
<div id="toastContainer" class="toast"><i class="ph ph-info text-2xl"></i><span id="toastMsg"></span></div>
<div id="drawerOverlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-xl z-[2000] hidden opacity-0" onclick="closeDrawers()"></div>
<nav class="max-w-5xl mx-auto flex justify-between items-center p-3 sm:p-4 glass mb-6 sm:mb-8 relative z-[1000] rounded-[2rem]" style="animation: fadeInUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;">
<button onclick="openModal('accountModal')" id="accBtn" class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl bg-slate-500/10 items-center justify-center hidden action-btn hover:bg-indigo-500/15 hover:text-indigo-500">
<i class="ph ph-user text-xl sm:text-2xl font-bold"></i>
</button>
<h1 class="text-xl sm:text-3xl font-black text-indigo-500 tracking-tight flex items-center gap-3 pl-2">
<i class="ph-fill ph-pill text-3xl"></i> MEDTRACKER
</h1>
<div class="flex gap-2 sm:gap-3">
<button id="syncBtn" class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl bg-green-500/10 text-green-500 flex items-center justify-center action-btn hidden">
<i class="ph ph-cloud-check text-xl sm:text-2xl font-bold" id="syncIcon"></i>
</button>
<button onclick="triggerNotification()" id="notifBtn" class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl bg-indigo-500/10 text-indigo-500 flex items-center justify-center action-btn hover:bg-indigo-500/20">
<i class="ph ph-bell-ringing text-xl sm:text-2xl font-bold"></i>
</button>
<button onclick="openRightDrawer()" class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl bg-slate-500/10 flex items-center justify-center action-btn hover:bg-indigo-500/15 hover:text-indigo-500">
<i class="ph ph-clock-counter-clockwise text-xl sm:text-2xl font-bold"></i>
</button>
<button onclick="toggleTheme()" class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl bg-slate-500/10 flex items-center justify-center action-btn hover:bg-indigo-500/15 hover:text-indigo-500">
<i class="ph ph-moon text-xl sm:text-2xl font-bold" id="themeIcon"></i>
</button>
</div>
</nav>
<main class="max-w-5xl mx-auto space-y-8 pb-16">
<div id="loginBox" class="glass p-8 sm:p-12 text-center space-y-8 max-w-md mx-auto mt-12 sm:mt-16 rounded-[2.5rem]" style="animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;">
<div class="w-24 h-24 sm:w-28 sm:h-28 bg-indigo-500/10 text-indigo-500 rounded-[2rem] flex items-center justify-center mx-auto mb-4 transition-transform duration-700 hover:scale-110 hover:rotate-[15deg]">
<i class="ph ph-lock-key text-5xl sm:text-6xl"></i>
</div>
<div>
<h2 class="text-3xl sm:text-4xl font-black mb-2 tracking-tight">Bienvenue</h2>
<p class="text-base opacity-70 font-bold">Veuillez vous identifier pour continuer</p>
</div>
<div class="space-y-5">
<div class="relative">
<i class="ph ph-text-aa absolute left-5 top-1/2 -translate-y-1/2 opacity-50 text-2xl transition-all duration-300" id="iconLN"></i>
<input type="text" id="lastName" oninput="validateInput('lastName', 'iconLN')" placeholder="Nom" class="w-full bg-slate-500/5 border border-slate-500/10 rounded-[1.5rem] p-5 pl-14 font-black outline-none focus:border-indigo-500 focus:bg-indigo-500/5 text-lg">
</div>
<div class="relative">
<i class="ph ph-text-a-underline absolute left-5 top-1/2 -translate-y-1/2 opacity-50 text-2xl transition-all duration-300" id="iconFN"></i>
<input type="text" id="firstName" oninput="validateInput('firstName', 'iconFN')" placeholder="Prénom" class="w-full bg-slate-500/5 border border-slate-500/10 rounded-[1.5rem] p-5 pl-14 font-black outline-none focus:border-indigo-500 focus:bg-indigo-500/5 text-lg">
</div>
<div>
<div class="relative">
<i class="ph ph-calendar-blank absolute left-5 top-1/2 -translate-y-1/2 opacity-50 text-2xl transition-all duration-300" id="iconBD"></i>
<input type="text" id="birthDate" placeholder="Date de naissance" class="w-full bg-slate-500/5 border border-slate-500/10 rounded-[1.5rem] p-5 pl-14 font-black outline-none focus:border-indigo-500 focus:bg-indigo-500/5 cursor-pointer text-lg">
</div>
<div id="ageDisplay" class="text-sm font-black text-indigo-500 mt-3 hidden text-right pr-4" style="animation: slideInRight 0.5s forwards;"></div>
</div>
<div class="relative">
<i class="ph ph-password absolute left-5 top-1/2 -translate-y-1/2 opacity-50 text-2xl"></i>
<input type="password" id="passInput" placeholder="Mot de passe" class="w-full bg-slate-500/5 border border-slate-500/10 rounded-[1.5rem] p-5 pl-14 font-black outline-none focus:border-indigo-500 focus:bg-indigo-500/5 hidden text-lg">
</div>
</div>
<button id="authBtn" onclick="handleAuth()" class="w-full py-5 sm:py-6 mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-black rounded-[1.5rem] opacity-50 pointer-events-none action-btn flex items-center justify-center gap-3 text-base tracking-widest uppercase shadow-xl shadow-indigo-600/40">
VÉRIFIER <i class="ph ph-arrow-right font-bold text-2xl"></i>
</button>
</div>
<div id="appBody" class="hidden space-y-8">
<div style="animation: fadeInUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;">
<div class="flex justify-between items-center px-2 mb-6 sm:mb-8">
<h2 class="font-black text-sm sm:text-base uppercase tracking-widest opacity-60 flex items-center gap-3">
<i class="ph ph-pill text-2xl"></i> Mes Médicaments
</h2>
<button onclick="openModal('addMedModal')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 sm:px-8 py-3 sm:py-4 rounded-[1.25rem] font-black text-sm uppercase tracking-wider action-btn flex items-center gap-3 shadow-xl shadow-indigo-500/40">
<i class="ph ph-plus-circle text-2xl"></i> AJOUTER
</button>
</div>
<div id="medsGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 sm:gap-8"></div>
</div>
<div class="glass p-6 sm:p-10 rounded-[2.5rem]" style="animation: fadeInUp 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; opacity: 0; animation-delay: 0.2s;">
<div class="flex justify-between items-center mb-8 bg-slate-500/5 p-3 rounded-3xl border border-slate-500/10">
<button onclick="changeMonth(-1)" class="w-12 h-12 flex items-center justify-center rounded-2xl hover:bg-slate-500/15 action-btn text-xl bg-white dark:bg-slate-800 shadow-md">
<i class="ph ph-caret-left font-bold"></i>
</button>
<h3 id="calMonth" class="font-black uppercase text-sm sm:text-base tracking-widest text-indigo-500 transition-all duration-500"></h3>
<button onclick="changeMonth(1)" class="w-12 h-12 flex items-center justify-center rounded-2xl hover:bg-slate-500/15 action-btn text-xl bg-white dark:bg-slate-800 shadow-md">
<i class="ph ph-caret-right font-bold"></i>
</button>
</div>
<div class="grid grid-cols-7 gap-2 sm:gap-3 mb-3 px-2">
<div class="text-center text-[11px] font-black opacity-50 uppercase tracking-widest">Lun</div>
<div class="text-center text-[11px] font-black opacity-50 uppercase tracking-widest">Mar</div>
<div class="text-center text-[11px] font-black opacity-50 uppercase tracking-widest">Mer</div>
<div class="text-center text-[11px] font-black opacity-50 uppercase tracking-widest">Jeu</div>
<div class="text-center text-[11px] font-black opacity-50 uppercase tracking-widest">Ven</div>
<div class="text-center text-[11px] font-black opacity-50 uppercase tracking-widest">Sam</div>
<div class="text-center text-[11px] font-black opacity-50 uppercase tracking-widest">Dim</div>
</div>
<div id="calendar" class="grid grid-cols-7 gap-2 sm:gap-4"></div>
</div>
</div>
</main>
<div id="accountModal" class="modal-overlay" onclick="closeModal('accountModal')">
<div class="modal-content glass p-8 sm:p-10" onclick="event.stopPropagation()">
<div class="flex justify-center mb-8 text-indigo-500">
<div class="w-24 h-24 sm:w-28 sm:h-28 bg-indigo-500/10 rounded-[2rem] flex items-center justify-center shadow-inner transition-transform duration-700 hover:scale-110 hover:rotate-12">
<i class="ph ph-user-circle text-5xl sm:text-6xl"></i>
</div>
</div>
<h3 class="font-black mb-8 text-center uppercase text-base tracking-widest text-indigo-500">Profil Utilisateur</h3>

<input type="text" id="editFN" placeholder="Prénom" class="w-full bg-slate-500/5 border border-slate-500/10 rounded-[1.5rem] p-4 sm:p-5 font-black text-lg outline-none focus:border-indigo-500 focus:bg-indigo-500/5">
<div>
<input type="text" id="editBD" placeholder="Date de naissance" class="w-full bg-slate-500/5 border border-slate-500/10 rounded-[1.5rem] p-4 sm:p-5 font-black text-lg outline-none focus:border-indigo-500 focus:bg-indigo-500/5 cursor-pointer">
<div id="editAgeDisplay" class="text-sm font-black text-indigo-500 mt-3 text-right pr-4"></div>
</div>
<div class="h-1 w-full bg-slate-500/20 my-6 sm:my-8 rounded-full"></div>
<input type="password" id="oldPassCheck" placeholder="Ancien mot de passe" class="w-full bg-slate-500/5 border border-indigo-500/50 rounded-[1.5rem] p-4 sm:p-5 font-black text-lg outline-none focus:border-indigo-500 focus:bg-indigo-500/5">
<input type="password" id="newPassSet" placeholder="Nouveau mot de passe" class="w-full bg-slate-500/5 border border-slate-500/10 rounded-[1.5rem] p-4 sm:p-5 font-black text-lg outline-none focus:border-indigo-500 focus:bg-indigo-500/5">
<div class="pt-5 space-y-3">
<button onclick="updateAccount()" class="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white font-black rounded-[1.5rem] text-sm uppercase tracking-widest action-btn shadow-xl shadow-indigo-600/40">Sauvegarder</button>
<button onclick="handleLogout()" class="w-full py-5 bg-slate-500/10 hover:bg-slate-500/20 font-black rounded-[1.5rem] text-sm uppercase tracking-widest action-btn flex items-center justify-center gap-3">
<i class="ph ph-sign-out text-xl"></i> Déconnexion
</button>
<button onclick="deleteAccount()" class="w-full py-5 text-red-500 bg-red-500/10 hover:bg-red-500/20 font-black rounded-[1.5rem] text-sm uppercase tracking-widest action-btn mt-2">Supprimer le compte</button>
</div>
</div>
</div>
</div>
<div id="timeModal" class="modal-overlay z-top" onclick="closeModal('timeModal')">
<div class="modal-content glass p-8 sm:p-10" onclick="event.stopPropagation()">
<div class="flex justify-center mb-8 text-indigo-500">
<div class="w-24 h-24 bg-indigo-500/10 rounded-[2rem] flex items-center justify-center shadow-inner transition-transform duration-700 hover:scale-110 hover:rotate-12">
<i class="ph ph-clock text-5xl"></i>
</div>
</div>
<h3 class="font-black mb-8 text-center uppercase text-base tracking-widest text-indigo-500">Heure de la prise</h3>
<input type="text" id="doseTime" class="w-full bg-slate-500/5 border border-slate-500/10 rounded-[1.5rem] p-6 font-black text-center text-3xl outline-none focus:border-indigo-500 focus:bg-indigo-500/5 cursor-pointer shadow-inner">
<button onclick="confirmTimeAndDose()" class="w-full mt-8 py-5 bg-indigo-600 hover:bg-indigo-700 text-white font-black rounded-[1.5rem] text-sm uppercase tracking-widest action-btn shadow-xl shadow-indigo-600/40">Valider</button>
<button onclick="closeModal('timeModal')" class="w-full py-5 mt-3 bg-slate-500/15 hover:bg-slate-500/25 font-black rounded-[1.5rem] uppercase text-sm tracking-widest action-btn">Annuler</button>
</div>
</div>
<div id="addMedModal" class="modal-overlay" onclick="closeModal('addMedModal')">
<div class="modal-content glass p-8 sm:p-10" onclick="event.stopPropagation()">
<div class="flex justify-center mb-8 text-indigo-500">
<div class="w-24 h-24 sm:w-28 sm:h-28 bg-indigo-500/10 rounded-[2rem] flex items-center justify-center shadow-inner transition-transform duration-700 hover:scale-110 hover:rotate-12">
<i class="ph ph-pill text-5xl sm:text-6xl"></i>
</div>
</div>
<h3 class="font-black mb-8 text-center uppercase text-base tracking-widest text-indigo-500">Nouveau Médicament</h3>

function calculateAge(dateStr) {
if(!dateStr) return "";
const today = new Date();
const birthDate = new Date(dateStr);
let age = today.getFullYear() - birthDate.getFullYear();
const m = today.getMonth() - birthDate.getMonth();
if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
age--;
}
return Âge : ${age} ans;
}

async function loadMeds() {
setSyncing(true);
try {
const { data: meds, error } = await sb.from('medications').select('*').eq('user_key', user);
if (error) {
showToast("Erreur chargement des données");
return;
}
medsData = {};
const countPromises = (meds || []).map(async m => {
const { count } = await sb.from('medication_doses').select('*', { count: 'exact', head: true }).eq('medication_id', m.id);
m._count = count || 0;
medsData[m.id] = m;
});
await Promise.all(countPromises);
const y = currentDate.getFullYear();
const m = currentDate.getMonth();
const startDate = ${y}-${String(m+1).padStart(2,'0')}-01;
const endDate = ${y}-${String(m+1).padStart(2,'0')}-${new Date(y, m+1, 0).getDate()};
const { data: hist } = await sb.from('medication_history').select('*').in('medication_id', Object.keys(medsData)).gte('date', startDate).lte('date', endDate);
window.medsHistoryMap = {};
(hist || []).forEach(h => { window.medsHistoryMap[${h.date}_${h.medication_id}] = h; });
renderAllMeds();
renderCalendar();
renderHistory();
} finally {
setSyncing(false);
}
}
function renderAllMeds() {
const grid = document.getElementById('medsGrid');
let index = 0;
for (let id in medsData) {
if (medsData[id].active !== false) {
renderMedCard(medsData[id], index);
index++;
} else {
const existingCard = document.getElementById(med-card-${id});
if(existingCard) existingCard.remove();
}
}
}
function renderMedCard(med, index) {
let card = document.getElementById(med-card-${med.id});
if(!card) {
card = document.createElement('div');
card.id = med-card-${med.id};
card.className = "glass p-6 sm:p-8 relative rounded-[2rem] overflow-hidden group";
card.style.animation = fadeInUp 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
card.style.opacity = '0';
card.style.animationDelay = ${index * 0.12}s;
document.getElementById('medsGrid').appendChild(card);
}
updateMedCardDOM(med.id);
}
function updateMedCardDOM(id) {
const med = medsData[id];
const card = document.getElementById(med-card-${id});
if(!card) return;
const count = med._count || 0;
const total = med.pieces_per_plate * med.plates_per_box;
const prog = total ? (count / total) * 100 : 0;
const plateIdx = Math.floor(count / med.pieces_per_plate) + 1;
const remaining = total - count;
let tag = prog >= 90 ? <div class="alert-stock bg-red-500 text-white shadow-xl shadow-red-500/50">URGENT</div> : prog >= 80 ? <div class="alert-stock bg-orange-500 text-white shadow-xl shadow-orange-500/50">STOCK BAS</div> : <div class="text-[11px] font-black opacity-60 uppercase tracking-widest">${remaining} restantes</div>;
card.innerHTML =  <div class="absolute top-0 right-0 w-32 h-32 sm:w-40 sm:h-40 opacity-15 rounded-bl-[4rem] pointer-events-none transition-transform duration-700 group-hover:scale-125 group-hover:opacity-25" style="background:${med.color}"></div> <div class="flex justify-between items-start mb-5 relative z-10"> <div class="font-black text-xl sm:text-2xl uppercase tracking-wide truncate max-w-[65%]" style="color:${med.color}">${med.name}</div> ${tag} </div> <div class="progress-container mb-5"> <div class="progress-bar" style="width:${prog}%; background:${med.color}"></div> </div> <div class="flex justify-between items-center mb-8 relative z-10"> <span class="text-sm font-black opacity-60 bg-slate-500/10 px-4 py-2 rounded-xl">Plaque ${plateIdx}</span> <span class="text-lg sm:text-xl font-black transition-all duration-500" style="color:${med.color}">${Math.round(prog)}%</span> </div> <div class="flex items-center justify-between bg-slate-500/5 p-3 sm:p-4 rounded-[1.5rem] relative z-10 border border-slate-500/10 shadow-inner"> <button onclick="changeDose('${med.id}', -1)" class="w-14 h-14 rounded-2xl bg-white dark:bg-slate-800 text-slate-800 dark:text-white shadow-lg flex items-center justify-center font-black action-btn hover:text-red-500 text-2xl"> <i class="ph ph-minus"></i> </button> <div class="text-center px-3 sm:px-5"> <div class="text-4xl sm:text-5xl font-black tracking-tighter dose-anim" id="dose-text-${med.id}">${count % med.pieces_per_plate}</div> <div class="text-[11px] opacity-50 font-black uppercase tracking-widest mt-2">/ ${med.pieces_per_plate}</div> </div> <button onclick="openTimePrompt('${med.id}', 1)" class="w-14 h-14 rounded-2xl bg-white dark:bg-slate-800 shadow-lg flex items-center justify-center font-black text-2xl action-btn" style="color:${med.color}"> <i class="ph ph-plus"></i> </button> </div>;
const doseText = document.getElementById(dose-text-${med.id});
if(doseText) {
doseText.style.transform = 'scale(1.5)';
setTimeout(() => doseText.style.transform = 'scale(1)', 300);
}
}

window.syncDoseToDB = async (id, val, d, med, time) => {
setSyncing(true);
try {
if (val > 0) {
let payload = { medication_id: id };
if(time) {
const [hh, mm] = time.split(':');
const dd = new Date(d);
dd.setHours(parseInt(hh), parseInt(mm), 0, 0);
payload.created_at = dd.toISOString();
}
await sb.from('medication_doses').insert(payload);
} else {
const { data: last } = await sb.from('medication_doses').select('id').eq('medication_id', id).order('id', { ascending: false }).limit(1).single();
if (last) await sb.from('medication_doses').delete().eq('id', last.id);
}
const { count: newCount } = await sb.from('medication_doses').select('*', { count: 'exact', head: true }).eq('medication_id', id);
const { data: exist } = await sb.from('medication_history').select('count').eq('medication_id', id).eq('date', d).single();
if (exist) {
await sb.from('medication_history').update({ count: Math.max(0, exist.count + val), cumulative: newCount, color: med.color }).eq('medication_id', id).eq('date', d);
} else if (val > 0) {
await sb.from('medication_history').insert({ medication_id: id, date: d, count: 1, cumulative: newCount, color: med.color });
}
} catch(e) {} finally {
setSyncing(false);
}
};
window.changeDose = async (id, val, date = null, time = null) => {
const med = medsData[id];
if (!med) return;
const d = date || new Date().toISOString().split('T')[0];
if(!med._count) med._count = 0;
const maxTotal = med.pieces_per_plate * med.plates_per_box;
if (val > 0 && med._count >= maxTotal) {
if (confirm("Boîte terminée. Entamer une nouvelle ?")) {
med.box_count = (med.box_count || 1) + 1;
med._count = 0;
if(navigator.onLine) {
setSyncing(true);
try {
await sb.from('medication_doses').delete().eq('medication_id', id);
await sb.from('medications').update({ box_count: med.box_count }).eq('id', id);
showToast("Nouvelle boîte entamée");
await loadMeds();
} finally {
setSyncing(false);
}
} else {
showToast("Hors ligne : action reportée");
}
}
return;
}
med._count = Math.max(0, med._count + val);
const hKey = ${d}_${id};
if(!window.medsHistoryMap) window.medsHistoryMap = {};
if(!window.medsHistoryMap[hKey]) window.medsHistoryMap[hKey] = {count: 0, color: med.color};
window.medsHistoryMap[hKey].count = Math.max(0, window.medsHistoryMap[hKey].count + val);
updateMedCardDOM(id);
renderCalendar();
if(date) renderDayEditList(date);
if(!navigator.onLine) {
let q = JSON.parse(localStorage.getItem('medQueue') || '[]');
q.push({ type: 'dose', id, val, date: d, med, time });
localStorage.setItem('medQueue', JSON.stringify(q));
setSyncing(true);
setTimeout(() => setSyncing(false), 800);
return;
}
await syncDoseToDB(id, val, d, med, time);
};
function renderCalendar() {
const cal = document.getElementById('calendar');
const y = currentDate.getFullYear();
const m = currentDate.getMonth();
cal.innerHTML = "";
const monthName = new Intl.DateTimeFormat('fr', { month: 'long', year: 'numeric' }).format(currentDate);
document.getElementById('calMonth').innerText = monthName;
let first = (new Date(y, m, 1).getDay() - 1);
if (first === -1) first = 6;
for (let i = 0; i < first; i++) cal.innerHTML += '<div class="opacity-0"></div>';
const todayStr = new Date().toISOString().split('T')[0];
for (let d = 1; d <= new Date(y, m + 1, 0).getDate(); d++) {
const dateStr = ${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')};
const isToday = dateStr === todayStr;
const cell = document.createElement('div');
cell.className = cal-cell glass ${isToday ? 'border-indigo-500 border-2 bg-indigo-500/10 shadow-lg' : ''};
cell.onclick = () => openDayEdit(dateStr);
cell.style.animation = fadeInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
cell.style.opacity = '0';
cell.style.animationDelay = ${d * 0.02}s;
let badges = '', total = 0;
for (let id in medsData) {
const h = window.medsHistoryMap[${dateStr}_${id}];
if (h && h.count > 0) {
badges += <div class="ratio-badge" style="background:${h.color || medsData[id].color}">${h.count}</div>;
total += h.count;
}
}
const dayNumClass = isToday ? 'text-indigo-500 opacity-100 text-sm' : 'opacity-60';
cell.innerHTML = <span class="text-xs sm:text-sm font-black ${dayNumClass} mb-1">${d}</span> <div class="flex flex-wrap gap-1">${badges}</div> <div class="mt-auto text-center font-black text-[11px] opacity-40 pt-1 transition-all">${total > 0 ? total + ' pr.' : ''}</div>;
cal.appendChild(cell);
}
}
function renderDayEditList(date) {
const list = document.getElementById('editDayList');
let html = '';
let index = 0;
for (let id in medsData) {
if (medsData[id].active === false) continue;
const m = medsData[id];
const hKey = ${date}_${id};
const val = (window.medsHistoryMap && window.medsHistoryMap[hKey]) ? window.medsHistoryMap[hKey].count : 0;
html +=  <div class="p-5 bg-slate-500/5 border border-slate-500/10 rounded-[1.5rem] flex justify-between items-center hover:bg-slate-500/10 transition-all shadow-sm" style="animation: slideInRight 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; opacity: 0; animation-delay: ${index * 0.06}s;"> <div> <div class="text-base font-black uppercase tracking-wide" style="color:${m.color}">${m.name}</div> <div class="text-sm font-bold opacity-70 mt-2 flex items-center gap-2"><i class="ph ph-check-circle text-xl"></i> <span class="dose-anim inline-block" id="modal-dose-${id}">${val}</span> prises</div> </div> <div class="flex gap-3 bg-white dark:bg-slate-800 p-2 rounded-[1.25rem] shadow-lg border border-slate-500/10"> <button onclick="animateModalDose('${id}', -1, '${date}')" class="w-12 h-12 sm:w-14 sm:h-14 rounded-[1rem] bg-slate-500/5 hover:bg-slate-500/15 text-slate-800 dark:text-white font-black action-btn flex items-center justify-center text-2xl"><i class="ph ph-minus"></i></button> <button onclick="animateModalDose('${id}', 1, '${date}')" class="w-12 h-12 sm:w-14 sm:h-14 rounded-[1rem] bg-slate-500/5 hover:bg-slate-500/15 font-black action-btn flex items-center justify-center text-2xl" style="color:${m.color}"><i class="ph ph-plus"></i></button> </div> </div>;
index++;
}
list.innerHTML = html || '<p class="text-center text-base opacity-60 font-black py-8">Aucun médicament actif.</p>';
}
window.animateModalDose = (id, val, date) => {
if (val > 0) {
openTimePrompt(id, val, date);
} else {
changeDose(id, val, date);
const doseText = document.getElementById(modal-dose-${id});
if(doseText) {
doseText.style.transform = 'scale(1.6)';
setTimeout(() => doseText.style.transform = 'scale(1)', 300);
}
}
};
window.openDayEdit = (date) => {
const dateObj = new Date(date);
const formatOpts = { weekday: 'long', day: 'numeric', month: 'long' };
document.getElementById('editDayTitle').innerText = new Intl.DateTimeFormat('fr', formatOpts).format(dateObj);
openModal('editDayModal');
renderDayEditList(date);
};
function renderHistory() {
const list = document.getElementById('globalHistoryList'); list.innerHTML = "";
let index = 0;
for (let id in medsData) {
const m = medsData[id];
list.innerHTML +=  <div class="p-5 sm:p-6 bg-slate-500/5 border border-slate-500/10 rounded-[1.5rem] mb-4 sm:mb-5 relative overflow-hidden group shadow-sm hover:shadow-lg transition-all duration-500" style="animation: slideInRight 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; opacity: 0; animation-delay: ${index * 0.1}s;"> <div class="absolute left-0 top-0 bottom-0 w-3 transition-all duration-500 group-hover:w-4" style="background:${m.color}"></div> <div class="flex justify-between items-start mb-5 pl-4"> <span class="text-base sm:text-lg font-black tracking-wide" style="color:${m.color}">${m.name}</span> <div class="flex gap-3"> <button onclick="toggleArchive('${id}', ${m.active})" class="px-4 py-2 rounded-xl bg-slate-200 dark:bg-slate-700 text-slate-900 dark:text-white text-[11px] sm:text-xs font-black uppercase tracking-widest action-btn transition-all flex items-center shadow-md"> ${m.active ? '<i class="ph ph-archive text-base mr-2"></i> Archiver' : '<i class="ph ph-check text-base mr-2"></i> Activer'} </button> <button onclick="deleteMed('${id}')" class="w-10 h-10 sm:w-11 sm:h-11 rounded-xl bg-red-500/10 text-red-500 flex items-center justify-center hover:bg-red-500/20 action-btn transition-colors shadow-md text-xl"> <i class="ph ph-trash font-black"></i> </button> </div> </div> <div class="flex justify-between items-center font-black opacity-90 pl-4 bg-slate-500/5 p-4 rounded-2xl shadow-inner border border-slate-500/10"> <span class="flex items-center gap-2 uppercase tracking-widest text-[10px] sm:text-[11px]"><i class="ph ph-package text-xl"></i> Boîtes utilisées :</span> <input type="number" value="${m.box_count || 1}" onchange="updateBox('${id}', this.value)" class="w-20 sm:w-24 bg-white dark:bg-slate-800 text-slate-900 dark:text-white border border-slate-500/10 rounded-xl p-2 text-center font-black shadow-md outline-none focus:border-indigo-500 text-sm sm:text-base transition-all duration-400 focus:scale-105"> </div> </div>;
index++;
}
}
window.updateBox = async (id, val) => {
setSyncing(true);
try {
await sb.from('medications').update({ box_count: parseInt(val) }).eq('id', id);
showToast("Quantité de boîtes mise à jour");
loadMeds();
} finally {
setSyncing(false);
}
};
window.toggleArchive = async (id, s) => {
setSyncing(true);
try {
await sb.from('medications').update({ active: s === false }).eq('id', id);
showToast(s ? "Médicament archivé" : "Médicament réactivé");
loadMeds();
} finally {
setSyncing(false);
}
};
window.deleteMed = async (id) => {
if (confirm("Voulez-vous supprimer ce médicament définitivement ?")) {
setSyncing(true);
try {
await sb.from('medications').delete().eq('id', id);
showToast("Médicament supprimé");
loadMeds();
} finally {
setSyncing(false);
}
}
};
window.confirmAddMed = async () => {
const n = document.getElementById('newMedName').value.trim();
const pi = parseInt(document.getElementById('newMedPieces').value);
const pl = parseInt(document.getElementById('newMedPlates').value) || 1;
const c = document.getElementById('newMedColor').value;
if (!n || !pi) return showToast("Nom et doses/plq sont obligatoires");
setSyncing(true);
try {
const { error } = await sb.from('medications').insert({ user_key: user, name: n, pieces_per_plate: pi, plates_per_box: pl, color: c, active: true, box_count: 1 });
if (error) {
showToast("Erreur lors de l'ajout");
return;
}
showToast("Médicament ajouté avec succès");
closeModal('addMedModal');
document.getElementById('newMedName').value = '';
document.getElementById('newMedPieces').value = '';
document.getElementById('newMedPlates').value = '';
document.getElementById('newMedColor').value = '#6366f1';
document.getElementById('colorPreview').style.background = '#6366f1';
document.getElementById('addMedBtn').classList.add('opacity-50', 'pointer-events-none');
loadMeds();
} finally {
setSyncing(false);
}
};
window.openRightDrawer = () => {
const drawer = document.getElementById('rightDrawer');
const overlay = document.getElementById('drawerOverlay');
overlay.classList.remove('hidden');
requestAnimationFrame(() => {
overlay.classList.add('opacity-100');
drawer.classList.remove('translate-x-full');
});
};
window.closeDrawers = () => {
const drawer = document.getElementById('rightDrawer');
const overlay = document.getElementById('drawerOverlay');
drawer.classList.add('translate-x-full');
overlay.classList.remove('opacity-100');
setTimeout(() => overlay.classList.add('hidden'), 700);
};
window.openModal = (id) => {
const modal = document.getElementById(id);
modal.classList.add('open');
};
window.closeModal = (id) => {
const modal = document.getElementById(id);
modal.classList.remove('open');
};
window.changeMonth = async (v) => {
currentDate.setMonth(currentDate.getMonth() + v);
const monthName = new Intl.DateTimeFormat('fr', { month: 'long', year: 'numeric' }).format(currentDate);
const title = document.getElementById('calMonth');
title.style.transform = 'scale(0.85)';
title.style.opacity = '0';
setTimeout(() => {
title.innerText = monthName;
title.style.transform = 'scale(1)';
title.style.opacity = '1';
}, 300);
if(!navigator.onLine) {
renderCalendar();
return;
}
setSyncing(true);
try {
const y = currentDate.getFullYear();
const m = currentDate.getMonth();
const startDate = ${y}-${String(m+1).padStart(2,'0')}-01;
const endDate = ${y}-${String(m+1).padStart(2,'0')}-${new Date(y, m+1, 0).getDate()};
const { data: hist } = await sb.from('medication_history').select('*').in('medication_id', Object.keys(medsData)).gte('date', startDate).lte('date', endDate);
(hist || []).forEach(h => { window.medsHistoryMap[${h.date}_${h.medication_id}] = h; });
renderCalendar();
} finally {
setSyncing(false);
}
};
window.toggleTheme = () => {
const isDark = document.body.classList.toggle('dark');
localStorage.setItem('theme', isDark ? 'dark' : 'light');
const icon = document.getElementById('themeIcon');
icon.style.transform = 'rotate(180deg) scale(0)';
setTimeout(() => {
if (isDark) {
icon.classList.replace('ph-moon', 'ph-sun');
} else {
icon.classList.replace('ph-sun', 'ph-moon');
}
icon.style.transform = 'rotate(0deg) scale(1)';
}, 300);
};
window.handleLogout = () => {
localStorage.removeItem('medUser');
document.body.style.opacity = '0';
setTimeout(() => location.reload(), 700);
};
initUI();
if (user) initApp();
});
</script>
</body>
</html>
